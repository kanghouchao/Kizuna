# E2E one-shot 実行 compose（issue #247）
# 既存の開発スタック（project kizuna）を再利用し、external な kizuna_network に
# attach してフル実スタックを外部から検証する。自前の DB/backend は立てない。
# gateway サービスの network alias（store1.kizuna.test / kizuna.test）で名前解決する。
name: kizuna-e2e

services:
  e2e:
    # タグは e2e/package.json の @playwright/test バージョンから派生（root Taskfile の e2e が
    # PLAYWRIGHT_VERSION を export する）。既定値は単独 compose 実行時のフォールバック。
    image: mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION:-1.61.1}-noble
    working_dir: /e2e
    volumes:
      # ソースを bind-mount。成果物（test-results / playwright-report）はホスト e2e/ に残る。
      - .:/e2e
      # コンテナ側（linux）の node_modules を、bind-mount したホスト e2e/ から分離するための
      # 名前付き volume。ホスト（別プラットフォーム）の node_modules との衝突を避けるのが目的。
      # 注: npm ci は毎回 node_modules を削除して作り直すため、これは取得の高速化ではない。
      - e2e-node-modules:/e2e/node_modules
    environment:
      # gateway alias 経由で store ドメインへ到達する baseURL。
      BASE_URL: http://store1.kizuna.test
    command: sh -c "npm ci && npx bddgen && npx playwright test"
    networks:
      - kizuna_network

volumes:
  e2e-node-modules:

networks:
  # 開発スタックが作成する既存ネットワーク（docker compose -p kizuna の network）。
  kizuna_network:
    external: true
