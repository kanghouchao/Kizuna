version: '3'

# フロントエンド用タスク
vars:
  DOCKER_IMAGE: '{{default "kizuna-frontend" .DOCKER_IMAGE}}'
  DOCKER_TAG: '{{default "latest" .DOCKER_TAG}}'

tasks:
  default:
    desc: ヘルプ情報を表示
    cmds:
      - task: help

  help:
    desc: ヘルプ情報を表示
    cmds:
      - task --list

  build:
    desc: フロントエンドDockerイメージをビルド
    cmds:
      - echo "🏗️  フロントエンドDockerイメージをビルド中..."
      - docker buildx build -t {{.DOCKER_IMAGE}}:{{.DOCKER_TAG}} .

  lint:
    desc: ESLint を実行（Docker lint ステージ経由）
    cmds:
      - echo "🧹 Docker の lint ステージで ESLint を実行中..."
      - |
        docker buildx build \
          --target lint \
          --output type=cacheonly \
          .

  format:
    desc: ESLint の自動修正をローカルで実行
    cmds:
      - echo "✍️  ESLint の自動修正を実行中..."
      - |
        if [ ! -d node_modules ]; then
          echo "📦 依存をインストール中..."
          npm ci || npm install
        fi
      - npm run format
      - npm run lint:fix

  test:
    desc: Docker コンテナ内でユニットテストを実行し、artifacts にレポートを収集
    cmds:
      - echo "Docker 上でテストを実行しています..."
      - |
        docker buildx build \
          --target test \
          -t {{.DOCKER_IMAGE}}-test:{{.DOCKER_TAG}} \
          --load \
          .

  clean:
    desc: Dockerイメージを削除
    cmds:
      - echo "🗑️  フロントエンドDockerイメージを削除中..."
      - docker rmi {{.DOCKER_IMAGE}}:{{.DOCKER_TAG}} 2>/dev/null || echo "イメージが存在しないか、既に削除されています"
      - docker rmi {{.DOCKER_IMAGE}}-test:{{.DOCKER_TAG}} 2>/dev/null || echo "テストイメージが存在しないか、既に削除されています"
      - docker rmi {{.DOCKER_IMAGE}}-lint:{{.DOCKER_TAG}} 2>/dev/null || echo "Lintイメージが存在しないか、既に削除されています"
