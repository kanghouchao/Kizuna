name: Verify Master

# PR ゲート（Lint and Test）は lint+unit(coverage)+build に絞られている。
# integration と e2e は門禁にせず、合併後の push→master でここで実行し fix-forward する。
# paths は lint-and-test.yml の docs-only 境界（コード領域）と同一集合に保つこと。
on:
  push:
    branches:
      - master
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'e2e/**'
      - 'infrastructure/**'
      - 'Taskfile*'
      - '.github/workflows/**'
      - '.github/scripts/**'

jobs:
  integration:
    name: Integration
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Set up Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Integration tests
        run: task test-integration
        env:
          DOCKER_BUILDKIT: 1
          BUILDKIT_PROGRESS: plain

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Set up Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: E2E tests
        run: task e2e
        env:
          DOCKER_BUILDKIT: 1
          BUILDKIT_PROGRESS: plain
