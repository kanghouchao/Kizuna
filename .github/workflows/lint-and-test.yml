name: CI

on:
  pull_request:
    branches:
      - master

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      docs_only: ${{ steps.diff.outputs.docs_only }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # docs-only 判定で HEAD^1（ベース側の親）との diff を取るため 2 世代必要
          fetch-depth: 2

      # docs-only 判定: コード領域に触れない PR では重いゲートを省略する。
      # ジョブ自体は success で報告されるため、branch protection と claude-review の
      # 「Lint and Test 成功待ち」連鎖は保たれる。
      # 境界は .claude/skills/create-pr/check-pr.sh のコード領域判定と同一に保つこと。
      # diff が取れない場合は fail-closed（フルゲート実行）。
      - name: Detect docs-only diff
        id: diff
        run: |
          if ! files=$(git diff --name-only HEAD^1 HEAD); then
            echo "diff 取得失敗 — fail-closed でフルゲートを実行する"
            docs_only=false
          elif printf '%s\n' "$files" | grep -qE '^(frontend/|backend/|e2e/|infrastructure/|Taskfile|\.github/workflows/)'; then
            docs_only=false
          else
            docs_only=true
          fi
          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"
          echo "docs_only: $docs_only"

      - name: Set up Docker Buildx
        if: steps.diff.outputs.docs_only != 'true'
        uses: docker/setup-buildx-action@v4.0.0
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Set up Task
        if: steps.diff.outputs.docs_only != 'true'
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint
        if: steps.diff.outputs.docs_only != 'true'
        run: task lint
        env:
          DOCKER_BUILDKIT: 1
          BUILDKIT_PROGRESS: plain

      - name: Test
        if: steps.diff.outputs.docs_only != 'true'
        run: task test
        env:
          DOCKER_BUILDKIT: 1
          BUILDKIT_PROGRESS: plain

      - name: Create reports directory
        if: always() && steps.diff.outputs.docs_only != 'true'
        run: task reports

      - name: Inject report metadata (branch & PR)
        if: always() && steps.diff.outputs.docs_only != 'true'
        env:
          BRANCH_NAME: ${{ github.head_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number || 'N/A' }}
        run: |
          bash ./.github/scripts/inject-report-metadata.sh

      - name: Upload Pages artifact (from test/)
        if: always() && steps.diff.outputs.docs_only != 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          name: backend-test-reports
          path: reports

  deploy-reports:
    needs: lint-and-test
    # docs-only PR ではテスト成果物が無いためデプロイも省略
    if: needs.lint-and-test.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: reports
      cancel-in-progress: true
    environment:
      # ponytail: 固定名。PR ごとに環境を作ると Pages のアクティブデプロイ上限(100)に達して即失敗する
      name: reports
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v5.0.0
        with:
          artifact_name: backend-test-reports

      # Pages バックエンドは一時的に "Deployment failed, try again later" を返すことがあるため 1 回だけ再試行
      - name: Retry deploy after transient failure
        id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5.0.0
        with:
          artifact_name: backend-test-reports
