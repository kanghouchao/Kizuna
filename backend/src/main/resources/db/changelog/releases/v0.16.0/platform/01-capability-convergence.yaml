databaseChangeLog:
  - changeSet:
      id: platform-v0160-001-rename-capability-vocabulary
      author: kanghouchao
      # #404 決定2 / #409: 死語彙 3 件を終態語彙へ改名する。
      # enum 改名（Capability.java）と原子で適用しないと EnumType.STRING 照合が起動時に破綻するため同一コミットで扱う。
      preConditions:
        - dbms:
            type: postgresql
      changes:
        - update:
            tableName: t_capability_bundle_items
            columns:
              - column: { name: capability, value: STORE_MANAGE }
            where: capability = 'TENANT_MANAGE'
        - update:
            tableName: t_capability_bundle_items
            columns:
              - column: { name: capability, value: PLATFORM_MENU_VIEW }
            where: capability = 'CENTRAL_MENU_VIEW'
        - update:
            tableName: t_capability_bundle_items
            columns:
              - column: { name: capability, value: PLATFORM_ASSET_MANAGE }
            where: capability = 'CENTRAL_ASSET_MANAGE'
  - changeSet:
      id: platform-v0160-002-seed-store-menu-view
      author: kanghouchao
      # 店長・店舗スタッフ束へ店舗コンソールメニュー標識能力 STORE_MENU_VIEW を追加する（統合メニューの店舗グループ可視ゲート）。
      # 束は名称の部分問い合わせで FK を解決する（id は決め打ちしない）。再適用時は sqlCheck で MARK_RAN。
      preConditions:
        - onFail: MARK_RAN
        - sqlCheck:
            expectedResult: 0
            sql: SELECT COUNT(*) FROM t_capability_bundle_items WHERE capability = 'STORE_MENU_VIEW'
      changes:
        - insert:
            tableName: t_capability_bundle_items
            columns:
              - column: { name: bundle_id, valueComputed: "(SELECT id FROM t_capability_bundles WHERE name = '店長')" }
              - column: { name: capability, value: STORE_MENU_VIEW }
        - insert:
            tableName: t_capability_bundle_items
            columns:
              - column: { name: bundle_id, valueComputed: "(SELECT id FROM t_capability_bundles WHERE name = '店舗スタッフ')" }
              - column: { name: capability, value: STORE_MENU_VIEW }
