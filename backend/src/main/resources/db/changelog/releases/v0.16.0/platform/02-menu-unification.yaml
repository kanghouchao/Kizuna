databaseChangeLog:
  # CentralMenu/StoreMenu を単一 Menu 集約へ統合する（#404 決定2 / #409）。
  # t_menus を店舗次元から切り離し（store_id 撤去）、正典 17 行の統合樹へ差し替え、central_menus を廃止する。
  - changeSet:
      id: platform-v0160-003-drop-menu-store-scope
      author: kanghouchao
      # 店舗次元の撤去: FK・インデックス・store_id 列を順に落とす（子=依存を先に）。
      preConditions:
        - dbms:
            type: postgresql
      changes:
        - dropForeignKeyConstraint:
            baseTableName: t_menus
            constraintName: fk_t_menus_store
        - dropIndex:
            tableName: t_menus
            indexName: idx_t_menus_store
        - dropColumn:
            tableName: t_menus
            columnName: store_id
  - changeSet:
      id: platform-v0160-004-seed-unified-menus
      author: kanghouchao
      # 旧店舗メニュー行を全削除し、正典 17 行（2 階層厳守・全ノード permission 非 null）を投入する。
      # 親→子の順で挿入し自己参照 FK（fk_t_menus_parent）を満たす。
      # id/parent_id/label/path/icon/permission/sort_order のみ指定（version/created_at/updated_at は既定値）。
      preConditions:
        - dbms:
            type: postgresql
      changes:
        - delete:
            tableName: t_menus
        # --- プラットフォーム（中央）コンソール ---
        - insert:
            tableName: t_menus
            columns:
              - column: { name: id, value: platform-main }
              - column: { name: label, value: メイン }
              - column: { name: permission, value: PLATFORM_MENU_VIEW }
              - column: { name: sort_order, valueNumeric: 10 }
        - insert:
            tableName: t_menus
            columns:
              - column: { name: id, value: platform-dashboard }
              - column: { name: parent_id, value: platform-main }
              - column: { name: label, value: ダッシュボード }
              - column: { name: path, value: /central/dashboard }
              - column: { name: icon, value: HomeIcon }
              - column: { name: permission, value: PLATFORM_MENU_VIEW }
              - column: { name: sort_order, valueNumeric: 1 }
        - insert:
            tableName: t_menus
            columns:
              - column: { name: id, value: platform-stores }
              - column: { name: parent_id, value: platform-main }
              - column: { name: label, value: テナント一覧 }
              - column: { name: path, value: /central/tenants }
              - column: { name: icon, value: BuildingOfficeIcon }
              - column: { name: permission, value: STORE_MANAGE }
              - column: { name: sort_order, valueNumeric: 2 }
        - insert:
            tableName: t_menus
            columns:
              - column: { name: id, value: platform-staff }
              - column: { name: parent_id, value: platform-main }
              - column: { name: label, value: スタッフ管理 }
              - column: { name: path, value: /central/staff }
              - column: { name: icon, value: UsersIcon }
              - column: { name: permission, value: STAFF_MANAGE }
              - column: { name: sort_order, valueNumeric: 3 }
        - insert:
            tableName: t_menus
            columns:
              - column: { name: id, value: platform-settings }
              - column: { name: label, value: 設定 }
              - column: { name: permission, value: PLATFORM_MENU_VIEW }
              - column: { name: sort_order, valueNumeric: 20 }
        - insert:
            tableName: t_menus
            columns:
              - column: { name: id, value: platform-config }
              - column: { name: parent_id, value: platform-settings }
              - column: { name: label, value: システム設定 }
              - column: { name: path, value: /central/settings }
              - column: { name: icon, value: CogIcon }
              - column: { name: permission, value: SYSTEM_CONFIG_MANAGE }
              - column: { name: sort_order, valueNumeric: 1 }
        # --- 店舗コンソール ---
        - insert:
            tableName: t_menus
            columns:
              - column: { name: id, value: store-main }
              - column: { name: label, value: メイン }
              - column: { name: permission, value: STORE_MENU_VIEW }
              - column: { name: sort_order, valueNumeric: 110 }
        - insert:
            tableName: t_menus
            columns:
              - column: { name: id, value: store-dashboard }
              - column: { name: parent_id, value: store-main }
              - column: { name: label, value: ダッシュボード }
              - column: { name: path, value: /tenant/dashboard }
              - column: { name: icon, value: HomeIcon }
              - column: { name: permission, value: STORE_MENU_VIEW }
              - column: { name: sort_order, valueNumeric: 1 }
        - insert:
            tableName: t_menus
            columns:
              - column: { name: id, value: store-ops }
              - column: { name: label, value: 業務管理 }
              - column: { name: permission, value: STORE_MENU_VIEW }
              - column: { name: sort_order, valueNumeric: 120 }
        - insert:
            tableName: t_menus
            columns:
              - column: { name: id, value: store-orders }
              - column: { name: parent_id, value: store-ops }
              - column: { name: label, value: 予約・案件管理 }
              - column: { name: path, value: /tenant/orders }
              - column: { name: icon, value: ClipboardDocumentListIcon }
              - column: { name: permission, value: ORDER_MANAGE }
              - column: { name: sort_order, valueNumeric: 1 }
        - insert:
            tableName: t_menus
            columns:
              - column: { name: id, value: store-hrm }
              - column: { name: label, value: HRM }
              - column: { name: permission, value: STORE_MENU_VIEW }
              - column: { name: sort_order, valueNumeric: 130 }
        - insert:
            tableName: t_menus
            columns:
              - column: { name: id, value: store-casts }
              - column: { name: parent_id, value: store-hrm }
              - column: { name: label, value: キャスト管理 }
              - column: { name: path, value: /tenant/casts }
              - column: { name: icon, value: FaceSmileIcon }
              - column: { name: permission, value: CAST_MANAGE }
              - column: { name: sort_order, valueNumeric: 1 }
        - insert:
            tableName: t_menus
            columns:
              - column: { name: id, value: store-shifts }
              - column: { name: parent_id, value: store-hrm }
              - column: { name: label, value: 出勤管理 }
              - column: { name: path, value: /tenant/shifts }
              - column: { name: icon, value: ClockIcon }
              - column: { name: permission, value: SHIFT_MANAGE }
              - column: { name: sort_order, valueNumeric: 2 }
        - insert:
            tableName: t_menus
            columns:
              - column: { name: id, value: store-crm }
              - column: { name: label, value: CRM }
              - column: { name: permission, value: STORE_MENU_VIEW }
              - column: { name: sort_order, valueNumeric: 140 }
        - insert:
            tableName: t_menus
            columns:
              - column: { name: id, value: store-customers }
              - column: { name: parent_id, value: store-crm }
              - column: { name: label, value: 顧客一覧 }
              - column: { name: path, value: /tenant/customers }
              - column: { name: icon, value: UserGroupIcon }
              - column: { name: permission, value: CUSTOMER_MANAGE }
              - column: { name: sort_order, valueNumeric: 1 }
        - insert:
            tableName: t_menus
            columns:
              - column: { name: id, value: store-settings }
              - column: { name: label, value: 設定 }
              - column: { name: permission, value: STORE_MENU_VIEW }
              - column: { name: sort_order, valueNumeric: 150 }
        - insert:
            tableName: t_menus
            columns:
              - column: { name: id, value: store-profile }
              - column: { name: parent_id, value: store-settings }
              - column: { name: label, value: 店舗情報 }
              - column: { name: path, value: /tenant/settings/profile }
              - column: { name: icon, value: BuildingStorefrontIcon }
              - column: { name: permission, value: STORE_PROFILE_MANAGE }
              - column: { name: sort_order, valueNumeric: 1 }
  - changeSet:
      id: platform-v0160-005-drop-central-menus
      author: kanghouchao
      # 中央メニュー表は統合により役目を終える。IDENTITY 所有シーケンスは dropTable で同時消滅する（#406 流儀）。
      preConditions:
        - dbms:
            type: postgresql
      changes:
        - dropTable:
            tableName: central_menus
            cascadeConstraints: true
