databaseChangeLog:
  - changeSet:
      id: tenant-v0100-001-cast-invitation-table
      author: kanghouchao
      preConditions:
        - dbms:
            type: postgresql
      changes:
        - createTable:
            tableName: t_cast_invitations
            remarks: キャスト招待テーブル
            columns:
              - column:
                  name: id
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_t_cast_invitations
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: cast_id
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
                  remarks: 招待対象の档案ID
              - column:
                  name: token
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_t_cast_invitations_token
                  remarks: 招待リンクのトークン
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                  remarks: 物理状態(PENDING/ACCEPTED/INVALIDATED)
              - column:
                  name: expires_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
                  remarks: 有効期限
              - column:
                  name: accepted_at
                  type: TIMESTAMP WITH TIME ZONE
                  remarks: 受諾日時
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            constraintName: fk_t_cast_invitations_tenant
            baseTableName: t_cast_invitations
            baseColumnNames: tenant_id
            referencedTableName: central_tenants
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_t_cast_invitations_cast
            baseTableName: t_cast_invitations
            baseColumnNames: cast_id
            referencedTableName: t_casts
            referencedColumnNames: id
            onDelete: CASCADE
  - changeSet:
      id: tenant-v0100-002-cast-platform-user-link
      author: kanghouchao
      preConditions:
        - dbms:
            type: postgresql
      changes:
        - addColumn:
            tableName: t_casts
            columns:
              - column:
                  name: platform_user_id
                  type: BIGINT
                  remarks: 紐づく平台身分ID (platform_usersに関連)
        - addForeignKeyConstraint:
            constraintName: fk_t_casts_platform_user
            baseTableName: t_casts
            baseColumnNames: platform_user_id
            referencedTableName: platform_users
            referencedColumnNames: id
            onDelete: SET NULL
