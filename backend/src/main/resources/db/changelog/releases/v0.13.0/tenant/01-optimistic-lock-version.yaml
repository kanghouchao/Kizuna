databaseChangeLog:
  - changeSet:
      id: tenant-v0130-001-optimistic-lock-version
      author: kanghouchao
      # 全実体への @Version 楽観ロック導入（#400）。テナント側 8 表へ version 列を追加し、既存行は 0 で初期化する。
      preConditions:
        - dbms:
            type: postgresql
      changes:
        - addColumn:
            tableName: t_cast_field_definitions
            columns:
              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
                  remarks: 楽観ロック用バージョン（既存行は 0 で初期化）
        - addColumn:
            tableName: t_cast_invitations
            columns:
              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
                  remarks: 楽観ロック用バージョン（既存行は 0 で初期化）
