databaseChangeLog:
  - changeSet:
      id: central-007-event-publication
      author: kanghouchao
      changes:
        - createTable:
            tableName: event_publication
            remarks: Spring Modulith イベント発行レジストリ（公式 PostgreSQL スキーマ準拠）
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_event_publication
              - column:
                  name: listener_id
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: event_type
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: serialized_event
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: publication_date
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: completion_date
                  type: TIMESTAMP WITH TIME ZONE
        - createIndex:
            tableName: event_publication
            indexName: event_publication_by_completion_date_idx
            columns:
              - column:
                  name: completion_date
        - sql:
            sql: CREATE INDEX IF NOT EXISTS event_publication_serialized_event_hash_idx ON event_publication USING hash(serialized_event)
