databaseChangeLog:
  - changeSet:
      id: tenant-v030-001-shift-schema
      author: kanghouchao
      preConditions:
        - dbms:
            type: postgresql
      changes:
        - createTable:
            tableName: t_shifts
            remarks: 出勤（シフト）情報テーブル
            columns:
              - column:
                  name: id
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_t_shifts
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: cast_id
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
                  remarks: 出勤するキャスト
              - column:
                  name: work_date
                  type: DATE
                  constraints:
                    nullable: false
                  remarks: 勤務日
              - column:
                  name: start_time
                  type: TIME
                  constraints:
                    nullable: false
                  remarks: 開始時刻
              - column:
                  name: end_time
                  type: TIME
                  constraints:
                    nullable: false
                  remarks: 終了時刻（start_time 以下なら翌日にまたがる勤務）
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: 'TENTATIVE'
                  constraints:
                    nullable: false
                  remarks: ステータス（TENTATIVE=仮/CONFIRMED=確定）
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            constraintName: fk_t_shifts_tenant
            baseTableName: t_shifts
            baseColumnNames: tenant_id
            referencedTableName: central_tenants
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_t_shifts_cast
            baseTableName: t_shifts
            baseColumnNames: cast_id
            referencedTableName: t_casts
            referencedColumnNames: id
            onDelete: CASCADE
        - createIndex:
            indexName: idx_t_shifts_tenant_work_date
            tableName: t_shifts
            columns:
              - column:
                  name: tenant_id
              - column:
                  name: work_date
