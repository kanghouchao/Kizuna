databaseChangeLog:
  - changeSet:
      id: central-v0120-001-authorization-schema
      author: kanghouchao
      # 授権モデル「能力束 × 担当店舗集合 ×（必要時）精算範囲」の基座（#382 / #398）。
      # 能力目録はコード定義（Capability enum）、束は DB データとして管理し固定ロール一覧を作らない。
      preConditions:
        - dbms:
            type: postgresql
      changes:
        - createTable:
            tableName: platform_capability_bundles
            remarks: 能力束（ロール=能力束の名前。束はデータとして追加でき発版を要しない）
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_platform_capability_bundles
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_platform_capability_bundles_name
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - createTable:
            tableName: platform_capability_bundle_items
            remarks: 束が含む能力（Capability enum 名）
            columns:
              - column:
                  name: bundle_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: capability
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: platform_capability_bundle_items
            columnNames: bundle_id,capability
            constraintName: pk_platform_capability_bundle_items
        - addForeignKeyConstraint:
            constraintName: fk_platform_capability_bundle_items_bundle
            baseTableName: platform_capability_bundle_items
            baseColumnNames: bundle_id
            referencedTableName: platform_capability_bundles
            referencedColumnNames: id
            onDelete: CASCADE
        - createTable:
            tableName: platform_user_bundles
            remarks: ユーザーへの能力束授与（STAFF は 1 束以上。兼務=複数束）
            columns:
              - column:
                  name: platform_user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: bundle_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: platform_user_bundles
            columnNames: platform_user_id,bundle_id
            constraintName: pk_platform_user_bundles
        - addForeignKeyConstraint:
            constraintName: fk_platform_user_bundles_user
            baseTableName: platform_user_bundles
            baseColumnNames: platform_user_id
            referencedTableName: platform_users
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            # 授与中の束の削除は授権を黙って失わせるため RESTRICT で拒否する（fail-loud）。
            constraintName: fk_platform_user_bundles_bundle
            baseTableName: platform_user_bundles
            baseColumnNames: bundle_id
            referencedTableName: platform_capability_bundles
            referencedColumnNames: id
            onDelete: RESTRICT
        - createTable:
            tableName: platform_user_settlement_stores
            remarks: 精算対象店舗集合（settlement_scope_type=SPECIFIC_STORES 時のみ行を持つ。#382 要件 5 — 次元の表現まで）
            columns:
              - column:
                  name: platform_user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: store_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: platform_user_settlement_stores
            columnNames: platform_user_id,store_id
            constraintName: pk_platform_user_settlement_stores
        - addForeignKeyConstraint:
            constraintName: fk_platform_user_settlement_stores_user
            baseTableName: platform_user_settlement_stores
            baseColumnNames: platform_user_id
            referencedTableName: platform_users
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_platform_user_settlement_stores_store
            baseTableName: platform_user_settlement_stores
            baseColumnNames: store_id
            referencedTableName: central_tenants
            referencedColumnNames: id
            onDelete: CASCADE
        - createTable:
            tableName: platform_grant_history
            remarks: 授権の付与・変更・停止・再開の追記専用履歴（停止後も実行主体の記録を保持する）
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_platform_grant_history
              - column:
                  name: platform_user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: actor_email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: action
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: detail
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            # 履歴の対象ユーザー行が消えると実行主体の記録が失われるため RESTRICT（履歴保全、fail-loud）。
            constraintName: fk_platform_grant_history_user
            baseTableName: platform_grant_history
            baseColumnNames: platform_user_id
            referencedTableName: platform_users
            referencedColumnNames: id
            onDelete: RESTRICT
        - createIndex:
            indexName: idx_platform_grant_history_user
            tableName: platform_grant_history
            columns:
              - column:
                  name: platform_user_id
        - addColumn:
            tableName: platform_users
            columns:
              - column:
                  name: user_type
                  type: VARCHAR(20)
                  remarks: 本人種別（STAFF/CAST/MEMBER）。v0120-003 で折込後に NOT NULL 化する
              - column:
                  name: settlement_scope_type
                  type: VARCHAR(20)
                  remarks: 精算範囲種別（NULL=精算範囲なし / ALL_STORES / SPECIFIC_STORES）
