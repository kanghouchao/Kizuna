databaseChangeLog:
  - changeSet:
      id: central-v0120-003-fold-roles-into-bundles
      author: kanghouchao
      # 既存の固定ロールを本人種別（user_type）と既定束の授与へ全量折込する（#398）。
      # UPDATE 駆動で全実データ行に作用し、WHERE 句で冪等化する（再適用でも無害）。
      # 折込後の到達可能端点はロール時代と同値（束は @PreAuthorize 行列から 1:1 導出 — 02 のシード参照）。
      preConditions:
        - dbms:
            type: postgresql
      changes:
        - sql:
            sql: >-
              UPDATE platform_users
              SET user_type = CASE role
                WHEN 'CAST' THEN 'CAST'
                WHEN 'MEMBER' THEN 'MEMBER'
                ELSE 'STAFF' END
              WHERE user_type IS NULL
        - sql:
            sql: >-
              INSERT INTO platform_user_bundles (platform_user_id, bundle_id)
              SELECT u.id, b.id
              FROM platform_users u
              JOIN platform_capability_bundles b ON b.name = CASE u.role
                WHEN 'HQ_ADMIN' THEN 'HQ管理者'
                WHEN 'STORE_MANAGER' THEN '店長'
                WHEN 'STORE_STAFF' THEN '店舗スタッフ' END
              WHERE NOT EXISTS (
                SELECT 1 FROM platform_user_bundles ub
                WHERE ub.platform_user_id = u.id AND ub.bundle_id = b.id)
        - addNotNullConstraint:
            tableName: platform_users
            columnName: user_type
            columnDataType: VARCHAR(20)
