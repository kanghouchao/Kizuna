databaseChangeLog:
  - changeSet:
      id: central-v0120-002-capability-bundle-seed
      author: kanghouchao
      # 既存 3 ロール（HQ_ADMIN / STORE_MANAGER / STORE_STAFF）を同値折込した既定束（#398）。
      # 束の中身は既存 @PreAuthorize 行列から 1:1 で導出しており、折込前後でデモユーザーの到達可能端点は同値。
      # id は明示せず IDENTITY 採番に委ね、items は自然キー（name）の部分問い合わせで FK を解決する。
      preConditions:
        - onFail: MARK_RAN
        - sqlCheck:
            expectedResult: 0
            sql: SELECT COUNT(*) FROM platform_capability_bundles WHERE name IN ('HQ管理者', '店長', '店舗スタッフ')
      changes:
        - insert:
            tableName: platform_capability_bundles
            columns:
              - column: { name: name, value: "HQ管理者" }
        - insert:
            tableName: platform_capability_bundles
            columns:
              - column: { name: name, value: "店長" }
        - insert:
            tableName: platform_capability_bundles
            columns:
              - column: { name: name, value: "店舗スタッフ" }

        # HQ管理者 ← HQ_ADMIN: 中央 5 能力 + 跨店参照 2 能力
        - insert:
            tableName: platform_capability_bundle_items
            columns:
              - column: { name: bundle_id, valueComputed: "(SELECT id FROM platform_capability_bundles WHERE name = 'HQ管理者')" }
              - column: { name: capability, value: TENANT_MANAGE }
        - insert:
            tableName: platform_capability_bundle_items
            columns:
              - column: { name: bundle_id, valueComputed: "(SELECT id FROM platform_capability_bundles WHERE name = 'HQ管理者')" }
              - column: { name: capability, value: STAFF_MANAGE }
        - insert:
            tableName: platform_capability_bundle_items
            columns:
              - column: { name: bundle_id, valueComputed: "(SELECT id FROM platform_capability_bundles WHERE name = 'HQ管理者')" }
              - column: { name: capability, value: SYSTEM_CONFIG_MANAGE }
        - insert:
            tableName: platform_capability_bundle_items
            columns:
              - column: { name: bundle_id, valueComputed: "(SELECT id FROM platform_capability_bundles WHERE name = 'HQ管理者')" }
              - column: { name: capability, value: CENTRAL_MENU_VIEW }
        - insert:
            tableName: platform_capability_bundle_items
            columns:
              - column: { name: bundle_id, valueComputed: "(SELECT id FROM platform_capability_bundles WHERE name = 'HQ管理者')" }
              - column: { name: capability, value: CENTRAL_ASSET_MANAGE }
        - insert:
            tableName: platform_capability_bundle_items
            columns:
              - column: { name: bundle_id, valueComputed: "(SELECT id FROM platform_capability_bundles WHERE name = 'HQ管理者')" }
              - column: { name: capability, value: STORE_VIEW }
        - insert:
            tableName: platform_capability_bundle_items
            columns:
              - column: { name: bundle_id, valueComputed: "(SELECT id FROM platform_capability_bundles WHERE name = 'HQ管理者')" }
              - column: { name: capability, value: ORDER_SET_MANAGE }

        # 店長 ← STORE_MANAGER: 跨店参照 2 能力 + 店舗 8 能力（全部）
        - insert:
            tableName: platform_capability_bundle_items
            columns:
              - column: { name: bundle_id, valueComputed: "(SELECT id FROM platform_capability_bundles WHERE name = '店長')" }
              - column: { name: capability, value: STORE_VIEW }
        - insert:
            tableName: platform_capability_bundle_items
            columns:
              - column: { name: bundle_id, valueComputed: "(SELECT id FROM platform_capability_bundles WHERE name = '店長')" }
              - column: { name: capability, value: ORDER_SET_MANAGE }
        - insert:
            tableName: platform_capability_bundle_items
            columns:
              - column: { name: bundle_id, valueComputed: "(SELECT id FROM platform_capability_bundles WHERE name = '店長')" }
              - column: { name: capability, value: ORDER_MANAGE }
        - insert:
            tableName: platform_capability_bundle_items
            columns:
              - column: { name: bundle_id, valueComputed: "(SELECT id FROM platform_capability_bundles WHERE name = '店長')" }
              - column: { name: capability, value: CUSTOMER_MANAGE }
        - insert:
            tableName: platform_capability_bundle_items
            columns:
              - column: { name: bundle_id, valueComputed: "(SELECT id FROM platform_capability_bundles WHERE name = '店長')" }
              - column: { name: capability, value: SHIFT_MANAGE }
        - insert:
            tableName: platform_capability_bundle_items
            columns:
              - column: { name: bundle_id, valueComputed: "(SELECT id FROM platform_capability_bundles WHERE name = '店長')" }
              - column: { name: capability, value: CAST_MANAGE }
        - insert:
            tableName: platform_capability_bundle_items
            columns:
              - column: { name: bundle_id, valueComputed: "(SELECT id FROM platform_capability_bundles WHERE name = '店長')" }
              - column: { name: capability, value: CAST_INVITE }
        - insert:
            tableName: platform_capability_bundle_items
            columns:
              - column: { name: bundle_id, valueComputed: "(SELECT id FROM platform_capability_bundles WHERE name = '店長')" }
              - column: { name: capability, value: CAST_FIELD_DEF_VIEW }
        - insert:
            tableName: platform_capability_bundle_items
            columns:
              - column: { name: bundle_id, valueComputed: "(SELECT id FROM platform_capability_bundles WHERE name = '店長')" }
              - column: { name: capability, value: CAST_FIELD_DEF_MANAGE }
        - insert:
            tableName: platform_capability_bundle_items
            columns:
              - column: { name: bundle_id, valueComputed: "(SELECT id FROM platform_capability_bundles WHERE name = '店長')" }
              - column: { name: capability, value: STORE_PROFILE_MANAGE }

        # 店舗スタッフ ← STORE_STAFF: 店長 − CAST_INVITE − CAST_FIELD_DEF_MANAGE（現 MANAGER 専用境界の保存）
        - insert:
            tableName: platform_capability_bundle_items
            columns:
              - column: { name: bundle_id, valueComputed: "(SELECT id FROM platform_capability_bundles WHERE name = '店舗スタッフ')" }
              - column: { name: capability, value: STORE_VIEW }
        - insert:
            tableName: platform_capability_bundle_items
            columns:
              - column: { name: bundle_id, valueComputed: "(SELECT id FROM platform_capability_bundles WHERE name = '店舗スタッフ')" }
              - column: { name: capability, value: ORDER_SET_MANAGE }
        - insert:
            tableName: platform_capability_bundle_items
            columns:
              - column: { name: bundle_id, valueComputed: "(SELECT id FROM platform_capability_bundles WHERE name = '店舗スタッフ')" }
              - column: { name: capability, value: ORDER_MANAGE }
        - insert:
            tableName: platform_capability_bundle_items
            columns:
              - column: { name: bundle_id, valueComputed: "(SELECT id FROM platform_capability_bundles WHERE name = '店舗スタッフ')" }
              - column: { name: capability, value: CUSTOMER_MANAGE }
        - insert:
            tableName: platform_capability_bundle_items
            columns:
              - column: { name: bundle_id, valueComputed: "(SELECT id FROM platform_capability_bundles WHERE name = '店舗スタッフ')" }
              - column: { name: capability, value: SHIFT_MANAGE }
        - insert:
            tableName: platform_capability_bundle_items
            columns:
              - column: { name: bundle_id, valueComputed: "(SELECT id FROM platform_capability_bundles WHERE name = '店舗スタッフ')" }
              - column: { name: capability, value: CAST_MANAGE }
        - insert:
            tableName: platform_capability_bundle_items
            columns:
              - column: { name: bundle_id, valueComputed: "(SELECT id FROM platform_capability_bundles WHERE name = '店舗スタッフ')" }
              - column: { name: capability, value: CAST_FIELD_DEF_VIEW }
        - insert:
            tableName: platform_capability_bundle_items
            columns:
              - column: { name: bundle_id, valueComputed: "(SELECT id FROM platform_capability_bundles WHERE name = '店舗スタッフ')" }
              - column: { name: capability, value: STORE_PROFILE_MANAGE }
