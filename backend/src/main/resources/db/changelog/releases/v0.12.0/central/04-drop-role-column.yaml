databaseChangeLog:
  - changeSet:
      id: central-v0120-004-drop-role-column
      author: kanghouchao
      # 固定ロール列の撤去（#398）。03 の折込確認後に適用される独立 changeset として分離し、
      # 万一の切り戻し時に 01〜03 まで適用した状態で停められるようにする。
      preConditions:
        - dbms:
            type: postgresql
      changes:
        - dropColumn:
            tableName: platform_users
            columnName: role
