# v0.1.0 = 単一ベースライン。設計変更の積み重ねで散った 17 リリース分の changeset を、
# 終態のテーブル定義そのものへ統合したもの（作っては消す表・改名 ALTER・列の後付けを一掃）。
# 構成は「platform（プラットフォーム全体で単一のデータ）」「store（店舗スコープのデータ）」
# 「seed（初期データ）」の 3 層。FK の依存順にそのまま並べてある。
databaseChangeLog:
  - include:
      file: platform/01-store.yaml
