databaseChangeLog:
  - changeSet:
      id: seed-v0100-002-menus
      author: kanghouchao
      # 統合メニューの正典 17 行（2 階層厳守・全ノード permission 非 null）。
      # 親→子の順で挿入し自己参照 FK（fk_t_menus_parent）を満たす。
      preConditions:
        - dbms:
            type: postgresql
      changes:
        # --- プラットフォームコンソール ---
        - insert:
            tableName: t_menus
            columns:
              - column: { name: id, value: platform-main }
              - column: { name: label, value: メイン }
              - column: { name: permission, value: PLATFORM_MENU_VIEW }
              - column: { name: sort_order, valueNumeric: 10 }
        - insert:
            tableName: t_menus
            columns:
              - column: { name: id, value: platform-dashboard }
              - column: { name: parent_id, value: platform-main }
              - column: { name: label, value: ダッシュボード }
              - column: { name: path, value: /platform/dashboard }
              - column: { name: icon, value: HomeIcon }
              - column: { name: permission, value: PLATFORM_MENU_VIEW }
              - column: { name: sort_order, valueNumeric: 1 }
