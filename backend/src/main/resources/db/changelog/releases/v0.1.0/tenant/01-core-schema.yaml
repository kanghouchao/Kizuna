databaseChangeLog:
  - changeSet:
      id: tenant-001-core-schema
      author: kanghouchao
      preConditions:
        - dbms:
            type: postgresql
      changes:
        - createTable:
            tableName: t_users
            remarks: 租户侧用户账户
            columns:
              - column:
                  name: id
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_t_users
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: nickname
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: enabled
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - createTable:
            tableName: t_roles
            remarks: 租户侧角色
            columns:
              - column:
                  name: id
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_t_roles
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - createTable:
            tableName: t_permissions
            remarks: 租户侧权限
            columns:
              - column:
                  name: id
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_t_permissions
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - createTable:
            tableName: t_pages
            remarks: 租户页面内容
            columns:
              - column:
                  name: id
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_t_pages
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: slug
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: content
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - createTable:
            tableName: t_user_roles
            remarks: 租户用户角色关联
            columns:
              - column:
                  name: user_id
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: role_id
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: assigned_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - createTable:
            tableName: t_role_permissions
            remarks: 租户角色权限关联
            columns:
              - column:
                  name: role_id
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: permission_id
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: assigned_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: t_users
            columnNames: tenant_id,email
            constraintName: uq_t_users_tenant_email
        - addUniqueConstraint:
            tableName: t_users
            columnNames: tenant_id,nickname
            constraintName: uq_t_users_tenant_nickname
        - addUniqueConstraint:
            tableName: t_roles
            columnNames: tenant_id,name
            constraintName: uq_t_roles_tenant_name
        - addUniqueConstraint:
            tableName: t_permissions
            columnNames: tenant_id,name
            constraintName: uq_t_permissions_tenant_name
        - addUniqueConstraint:
            tableName: t_pages
            columnNames: tenant_id,slug
            constraintName: uq_t_pages_tenant_slug
        - addPrimaryKey:
            tableName: t_user_roles
            columnNames: user_id,role_id
            constraintName: pk_t_user_roles
        - addPrimaryKey:
            tableName: t_role_permissions
            columnNames: role_id,permission_id
            constraintName: pk_t_role_permissions
        - addForeignKeyConstraint:
            constraintName: fk_t_users_tenant
            baseTableName: t_users
            baseColumnNames: tenant_id
            referencedTableName: central_tenants
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_t_roles_tenant
            baseTableName: t_roles
            baseColumnNames: tenant_id
            referencedTableName: central_tenants
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_t_permissions_tenant
            baseTableName: t_permissions
            baseColumnNames: tenant_id
            referencedTableName: central_tenants
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_t_pages_tenant
            baseTableName: t_pages
            baseColumnNames: tenant_id
            referencedTableName: central_tenants
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_t_user_roles_user
            baseTableName: t_user_roles
            baseColumnNames: user_id
            referencedTableName: t_users
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_t_user_roles_role
            baseTableName: t_user_roles
            baseColumnNames: role_id
            referencedTableName: t_roles
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_t_role_permissions_role
            baseTableName: t_role_permissions
            baseColumnNames: role_id
            referencedTableName: t_roles
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_t_role_permissions_permission
            baseTableName: t_role_permissions
            baseColumnNames: permission_id
            referencedTableName: t_permissions
            referencedColumnNames: id
            onDelete: CASCADE
