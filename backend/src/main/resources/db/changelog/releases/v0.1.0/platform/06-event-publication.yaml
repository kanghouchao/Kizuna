databaseChangeLog:
  - changeSet:
      id: platform-v0100-006-event-publication-schema
      author: kanghouchao
      # Spring Modulith のイベント発行レジストリ。スキーマは公式 PostgreSQL 定義に準拠する
      # （spring-modulith-starter-jdbc が期待する列名・索引をそのまま持つ）。
      # 全表 t_ 接頭辞の規約（#404）の唯一の例外。表名はフレームワークが決めており変更できない。
      preConditions:
        - dbms:
            type: postgresql
      changes:
        - createTable:
            tableName: event_publication
            remarks: Spring Modulith イベント発行レジストリ（公式 PostgreSQL スキーマ準拠）
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_event_publication
              - column:
                  name: listener_id
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: event_type
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: serialized_event
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: publication_date
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: completion_date
                  type: TIMESTAMP WITH TIME ZONE
        - createIndex:
            tableName: event_publication
            indexName: event_publication_by_completion_date_idx
            columns:
              - column:
                  name: completion_date
        - sql:
            # 完全一致検索専用のため hash 索引。Liquibase の createIndex は索引メソッドを
            # 指定できないため raw SQL で作る。
            sql: CREATE INDEX event_publication_serialized_event_hash_idx ON event_publication USING hash(serialized_event)
