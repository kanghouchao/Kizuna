databaseChangeLog:
  - changeSet:
      id: central-005-seed-data
      author: kanghouchao
      changes:
        # Auth Data
        - insert:
            tableName: central_roles
            columns:
              - column: { name: id, valueNumeric: 1 }
              - column: { name: name, value: ADMIN }
        - insert:
            tableName: central_permissions
            columns:
              - column: { name: id, valueNumeric: 1 }
              - column: { name: name, value: TENANT_MANAGE }
        - insert:
            tableName: central_role_permissions
            columns:
              - column: { name: role_id, valueNumeric: 1 }
              - column: { name: permission_id, valueNumeric: 1 }
        - insert:
            tableName: central_users
            columns:
              - column: { name: id, valueNumeric: 1 }
              - column: { name: username, value: admin }
              - column: { name: password, value: "$2a$10$vE/ReAxs2rLV.FEJSDUK4.EpsPrbllLD2uOgtPaEUh1koMTovAaue" }
              - column: { name: enabled, valueBoolean: true }
        - insert:
            tableName: central_user_roles
            columns:
              - column: { name: user_id, valueNumeric: 1 }
              - column: { name: role_id, valueNumeric: 1 }

        # Tenant Data
        - insert:
            tableName: central_tenants
            columns:
              - column: { name: id, valueNumeric: 1 }
              - column: { name: name, value: Sample Tenant }
              - column: { name: domain, value: store1.kizuna.test }
              - column: { name: email, value: admin@store1.kizuna.com }

        # Menu Data
        - insert:
            tableName: central_menus
            columns:
              - column: { name: id, valueNumeric: 1 }
              - column: { name: label, value: "メイン" }
              - column: { name: sort_order, valueNumeric: 10 }
        - insert:
            tableName: central_menus
            columns:
              - column: { name: id, valueNumeric: 2 }
              - column: { name: parent_id, valueNumeric: 1 }
              - column: { name: label, value: "ダッシュボード" }
              - column: { name: path, value: "/central/dashboard" }
              - column: { name: icon, value: "HomeIcon" }
              - column: { name: sort_order, valueNumeric: 1 }
        - insert:
            tableName: central_menus
            columns:
              - column: { name: id, valueNumeric: 3 }
              - column: { name: parent_id, valueNumeric: 1 }
              - column: { name: label, value: "テナント一覧" }
              - column: { name: path, value: "/central/tenants" }
              - column: { name: icon, value: "BuildingOfficeIcon" }
              - column: { name: permission, value: "TENANT_MANAGE" }
              - column: { name: sort_order, valueNumeric: 2 }

        # System Config Data
        - insert:
            tableName: central_configs
            columns:
              - column: { name: config_key, value: "maintenance_mode" }
              - column: { name: config_value, value: "false" }
              - column: { name: category, value: "SYSTEM" }
              - column: { name: description, value: "システムメンテナンスモード" }
        - insert:
            tableName: central_configs
            columns:
              - column: { name: config_key, value: "smtp_host" }
              - column: { name: config_value, value: "localhost" }
              - column: { name: category, value: "SMTP" }
              - column: { name: description, value: "SMTPサーバーホスト" }
        - insert:
            tableName: central_configs
            columns:
              - column: { name: config_key, value: "smtp_port" }
              - column: { name: config_value, value: "25" }
              - column: { name: category, value: "SMTP" }
              - column: { name: description, value: "SMTPサーバーポート" }

        # System Config Permissions
        - insert:
            tableName: central_permissions
            columns:
              - column: { name: id, valueNumeric: 2 }
              - column: { name: name, value: "SYSTEM_CONFIG" }
        - insert:
            tableName: central_role_permissions
            columns:
              - column: { name: role_id, valueNumeric: 1 }
              - column: { name: permission_id, valueNumeric: 2 }
        - insert:
            tableName: central_menus
            columns:
              - column: { name: id, valueNumeric: 4 }
              - column: { name: label, value: "設定" }
              - column: { name: sort_order, valueNumeric: 90 }
        - insert:
            tableName: central_menus
            columns:
              - column: { name: id, valueNumeric: 5 }
              - column: { name: parent_id, valueNumeric: 4 }
              - column: { name: label, value: "システム設定" }
              - column: { name: path, value: "/central/settings" }
              - column: { name: icon, value: "Cog6ToothIcon" }
              - column: { name: permission, value: "SYSTEM_CONFIG" }
              - column: { name: sort_order, valueNumeric: 1 }
