databaseChangeLog:
  - changeSet:
      id: seed-v0100-005-demo
      author: kanghouchao
      # 開発・E2E 用のデモデータ（店舗 2 件とその店長・スタッフ）。本番には要らないため
      # demo コンテキストに隔離する。実行時コンテキストは spring.liquibase.contexts（環境変数
      # LIQUIBASE_CONTEXTS）で切り替える。既定は production＝投入しないので、開発・統合テスト・E2E は
      # compose 側で demo を明示する。
      # id は採番に委ね、FK は自然キー（domain / email / 束名）の部分問い合わせで解決する。
      contextFilter: demo
      preConditions:
        - dbms:
            type: postgresql
      changes:
        - insert:
            tableName: t_stores
            columns:
              - column: { name: name, value: Sample Tenant }
              - column: { name: domain, value: store1.kizuna.test }
              - column: { name: email, value: admin@store1.kizuna.com }
        - insert:
            tableName: t_stores
            columns:
              - column: { name: name, value: Sample Tenant 2 }
              - column: { name: domain, value: store2.kizuna.test }
              - column: { name: email, value: admin@store2.kizuna.com }

        # 田中花子: 店長・店舗{1,2} 授権。password は changelog パラメータ demoUserPasswordHash
        # （spring.liquibase.parameters 経由。既定は平文 pass のハッシュ）から与える。
        - insert:
            tableName: t_users
            columns:
              - column: { name: email, value: tanaka.hanako@kizuna.test }
              - column: { name: password, value: "${demoUserPasswordHash}" }
              - column: { name: display_name, value: "田中花子" }
              - column: { name: enabled, valueBoolean: true }
              - column: { name: user_type, value: STAFF }
              - column: { name: store_scope_type, value: SPECIFIC_STORES }
        # 山田次郎: 店舗スタッフ・店舗{1} 授権。
        - insert:
            tableName: t_users
            columns:
              - column: { name: email, value: yamada.jiro@kizuna.test }
              - column: { name: password, value: "${demoUserPasswordHash}" }
              - column: { name: display_name, value: "山田次郎" }
              - column: { name: enabled, valueBoolean: true }
              - column: { name: user_type, value: STAFF }
              - column: { name: store_scope_type, value: SPECIFIC_STORES }

        - insert:
            tableName: t_user_bundles
            columns:
              - column: { name: platform_user_id, valueComputed: "(SELECT id FROM t_users WHERE email = 'tanaka.hanako@kizuna.test')" }
              - column: { name: bundle_id, valueComputed: "(SELECT id FROM t_capability_bundles WHERE name = '店長')" }
        - insert:
            tableName: t_user_bundles
            columns:
              - column: { name: platform_user_id, valueComputed: "(SELECT id FROM t_users WHERE email = 'yamada.jiro@kizuna.test')" }
              - column: { name: bundle_id, valueComputed: "(SELECT id FROM t_capability_bundles WHERE name = '店舗スタッフ')" }

        - insert:
            tableName: t_user_stores
            columns:
              - column: { name: platform_user_id, valueComputed: "(SELECT id FROM t_users WHERE email = 'tanaka.hanako@kizuna.test')" }
              - column: { name: store_id, valueComputed: "(SELECT id FROM t_stores WHERE domain = 'store1.kizuna.test')" }
        - insert:
            tableName: t_user_stores
            columns:
              - column: { name: platform_user_id, valueComputed: "(SELECT id FROM t_users WHERE email = 'tanaka.hanako@kizuna.test')" }
              - column: { name: store_id, valueComputed: "(SELECT id FROM t_stores WHERE domain = 'store2.kizuna.test')" }
        - insert:
            tableName: t_user_stores
            columns:
              - column: { name: platform_user_id, valueComputed: "(SELECT id FROM t_users WHERE email = 'yamada.jiro@kizuna.test')" }
              - column: { name: store_id, valueComputed: "(SELECT id FROM t_stores WHERE domain = 'store1.kizuna.test')" }

        - insert:
            tableName: t_store_profiles
            columns:
              - column: { name: store_id, valueComputed: "(SELECT id FROM t_stores WHERE domain = 'store1.kizuna.test')" }
              - column: { name: template_key, value: default }
              - column: { name: mv_type, value: image }
              - column: { name: description, value: Sample Tenant のサイトへようこそ }
              - column: { name: sns_links, valueComputed: "'[]'::jsonb" }
              - column: { name: partner_links, valueComputed: "'[]'::jsonb" }
        - insert:
            tableName: t_store_profiles
            columns:
              - column: { name: store_id, valueComputed: "(SELECT id FROM t_stores WHERE domain = 'store2.kizuna.test')" }
              - column: { name: template_key, value: default }
              - column: { name: mv_type, value: image }
              - column: { name: description, value: Sample Tenant 2 のサイトへようこそ }
              - column: { name: sns_links, valueComputed: "'[]'::jsonb" }
              - column: { name: partner_links, valueComputed: "'[]'::jsonb" }
