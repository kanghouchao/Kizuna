databaseChangeLog:
  - changeSet:
      id: platform-v0100-002-user-schema
      author: kanghouchao
      # プラットフォーム共通ユーザー（PlatformUser）。身分は全プラットフォーム級で、
      # データの見える範囲は「授権店舗集合（StoreScope）」で決まる。
      preConditions:
        - dbms:
            type: postgresql
      changes:
        - createTable:
            tableName: t_users
            remarks: プラットフォーム共通ユーザー（能力束 × 授権店舗集合 ×（必要時）精算範囲で授権する）
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_t_users
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_t_users_email
                  remarks: ログイン ID を兼ねるメールアドレス
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                  remarks: bcrypt ハッシュ
              - column:
                  name: display_name
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
                  remarks: 表示名
              - column:
                  name: enabled
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
                  remarks: 有効フラグ（false = 停止中）
              - column:
                  name: user_type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                  remarks: 本人種別（STAFF/CAST/MEMBER）
              - column:
                  name: store_scope_type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                  remarks: 授権店舗範囲種別（ALL_STORES / SPECIFIC_STORES）
              - column:
                  name: settlement_scope_type
                  type: VARCHAR(20)
                  remarks: 精算範囲種別（NULL=精算範囲なし / ALL_STORES / SPECIFIC_STORES）
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
                  remarks: 楽観ロック用バージョン
        - createTable:
            tableName: t_user_stores
            remarks: 授権店舗集合（store_scope_type=SPECIFIC_STORES 時のみ行を持つ）
            columns:
              - column:
                  name: platform_user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: store_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: t_user_stores
            columnNames: platform_user_id,store_id
            constraintName: pk_t_user_stores
        - addForeignKeyConstraint:
            constraintName: fk_t_user_stores_user
            baseTableName: t_user_stores
            baseColumnNames: platform_user_id
            referencedTableName: t_users
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            # 店舗削除には全店舗スコープ表が CASCADE で従う。残存する空集合は
            # authorizes() が全 false になる fail-closed 挙動。
            constraintName: fk_t_user_stores_store
            baseTableName: t_user_stores
            baseColumnNames: store_id
            referencedTableName: t_stores
            referencedColumnNames: id
            onDelete: CASCADE
        - createTable:
            tableName: t_user_settlement_stores
            remarks: 精算対象店舗集合（settlement_scope_type=SPECIFIC_STORES 時のみ行を持つ）
            columns:
              - column:
                  name: platform_user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: store_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: t_user_settlement_stores
            columnNames: platform_user_id,store_id
            constraintName: pk_t_user_settlement_stores
        - addForeignKeyConstraint:
            constraintName: fk_t_user_settlement_stores_user
            baseTableName: t_user_settlement_stores
            baseColumnNames: platform_user_id
            referencedTableName: t_users
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_t_user_settlement_stores_store
            baseTableName: t_user_settlement_stores
            baseColumnNames: store_id
            referencedTableName: t_stores
            referencedColumnNames: id
            onDelete: CASCADE
