databaseChangeLog:
  - changeSet:
      id: store-v0100-004-order-schema
      author: kanghouchao
      # 顧客来店の集約は Order（Reservation でも Booking でもない）。
      preConditions:
        - dbms:
            type: postgresql
      changes:
        - createTable:
            tableName: t_orders
            remarks: 注文テーブル
            columns:
              - column:
                  name: id
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_t_orders
              - column:
                  name: store_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: store_name
                  type: VARCHAR(255)
                  remarks: 店舗名
              - column:
                  name: receptionist_id
                  type: BIGINT
                  remarks: 受付担当者 ID（t_users 参照）
              - column:
                  name: customer_id
                  type: VARCHAR(64)
                  remarks: 顧客ID
              - column:
                  name: cast_id
                  type: VARCHAR(64)
                  remarks: キャストID
              - column:
                  name: business_date
                  type: DATE
                  constraints:
                    nullable: false
                  remarks: 営業日
              - column:
                  name: arrival_scheduled_start_time
                  type: TIME
                  remarks: 到着予定開始時間
              - column:
                  name: arrival_scheduled_end_time
                  type: TIME
                  remarks: 到着予定終了時間
              - column:
                  name: actual_arrival_time
                  type: TIME
                  remarks: 実際の到着時間 (IN)
              - column:
                  name: actual_end_time
                  type: TIME
                  remarks: 実際の終了時間 (OUT)
              - column:
                  name: course_minutes
                  type: INTEGER
                  remarks: コース分数
              - column:
                  name: extension_minutes
                  type: INTEGER
                  defaultValueNumeric: 0
                  remarks: 延長分数
              - column:
                  name: option_codes
                  type: JSONB
                  defaultValueComputed: "'[]'::jsonb"
                  remarks: オプションコード一覧 (JSON Array)
              - column:
                  name: discount_name
                  type: VARCHAR(255)
                  remarks: 割引名
              - column:
                  name: manual_discount
                  type: INTEGER
                  defaultValueNumeric: 0
                  remarks: 手動割引金額
              - column:
                  name: total_fee
                  type: INTEGER
                  defaultValueNumeric: 0
                  remarks: 総額
              - column:
                  name: used_points
                  type: INTEGER
                  defaultValueNumeric: 0
                  remarks: 利用ポイント
              - column:
                  name: manual_grant_points
                  type: INTEGER
                  defaultValueNumeric: 0
                  remarks: 手動付与ポイント
              - column:
                  name: auto_grant_points
                  type: INTEGER
                  defaultValueNumeric: 0
                  remarks: 自動付与ポイント
              - column:
                  name: survey_points
                  type: INTEGER
                  defaultValueNumeric: 0
                  remarks: アンケートポイント
              - column:
                  name: survey_status
                  type: VARCHAR(50)
                  defaultValue: UNANSWERED
                  remarks: アンケートステータス
              - column:
                  name: carrier
                  type: VARCHAR(100)
                  remarks: キャリア/Carrier
              - column:
                  name: media_name
                  type: VARCHAR(100)
                  remarks: 媒体名
              - column:
                  name: location_address
                  type: VARCHAR(500)
                  remarks: 派遣先住所
              - column:
                  name: location_building
                  type: VARCHAR(255)
                  remarks: 派遣先建物
              - column:
                  name: remarks
                  type: TEXT
                  remarks: 備考
              - column:
                  name: cast_driver_message
                  type: TEXT
                  remarks: キャスト・ドライバーへのメッセージ
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: CREATED
                  remarks: 注文ステータス
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
                  remarks: 楽観ロック用バージョン
        - addForeignKeyConstraint:
            constraintName: fk_t_orders_store
            baseTableName: t_orders
            baseColumnNames: store_id
            referencedTableName: t_stores
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_t_orders_receptionist_platform_user
            baseTableName: t_orders
            baseColumnNames: receptionist_id
            referencedTableName: t_users
            referencedColumnNames: id
            onDelete: SET NULL
        - addForeignKeyConstraint:
            constraintName: fk_t_orders_customer
            baseTableName: t_orders
            baseColumnNames: customer_id
            referencedTableName: t_customers
            referencedColumnNames: id
            onDelete: RESTRICT
        - addForeignKeyConstraint:
            constraintName: fk_t_orders_cast
            baseTableName: t_orders
            baseColumnNames: cast_id
            referencedTableName: t_casts
            referencedColumnNames: id
            onDelete: RESTRICT
        - createIndex:
            indexName: idx_t_orders_date
            tableName: t_orders
            columns:
              - column:
                  name: business_date
              - column:
                  name: store_id
        - createIndex:
            indexName: idx_t_orders_customer
            tableName: t_orders
            columns:
              - column:
                  name: customer_id
        - createIndex:
            indexName: idx_t_orders_cast
            tableName: t_orders
            columns:
              - column:
                  name: cast_id
