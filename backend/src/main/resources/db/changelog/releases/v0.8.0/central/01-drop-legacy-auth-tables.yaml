databaseChangeLog:
  - changeSet:
      id: central-v080-001-drop-legacy-auth-tables
      author: kanghouchao
      preConditions:
        - dbms:
            type: postgresql
      changes:
        # 旧 CentralAuth の認証テーブル群を撤去する（PlatformAuth へ統一済み、#326）。
        # 子表（関連テーブル）→親表の順で dropTable する。
        - dropTable:
            tableName: central_user_roles
            cascadeConstraints: true
        - dropTable:
            tableName: central_role_permissions
            cascadeConstraints: true
        - dropTable:
            tableName: central_users
            cascadeConstraints: true
        - dropTable:
            tableName: central_roles
            cascadeConstraints: true
        - dropTable:
            tableName: central_permissions
            cascadeConstraints: true
