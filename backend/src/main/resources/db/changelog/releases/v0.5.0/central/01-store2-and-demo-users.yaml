databaseChangeLog:
  - changeSet:
      id: central-v050-001-store2-and-demo-users-seed
      author: kanghouchao
      changes:
        # 統一ログインデモ用の店舗2。旧認証系（t_users 等）は持たず、平台ログイン専用（#324）。
        - insert:
            tableName: central_tenants
            columns:
              - column: { name: id, valueNumeric: 2 }
              - column: { name: name, value: Sample Tenant 2 }
              - column: { name: domain, value: store2.kizuna.test }
              - column: { name: email, value: admin@store2.kizuna.com }

        # 田中花子（デザイン03 のデモケース）: 店長・店舗{1,2} 授権。password は既存 bcrypt ハッシュ（平文 pass）を再利用する。
        - insert:
            tableName: platform_users
            columns:
              - column: { name: id, valueNumeric: 2 }
              - column: { name: email, value: tanaka.hanako@kizuna.test }
              - column: { name: password, value: "$2a$10$vE/ReAxs2rLV.FEJSDUK4.EpsPrbllLD2uOgtPaEUh1koMTovAaue" }
              - column: { name: display_name, value: "田中花子" }
              - column: { name: enabled, valueBoolean: true }
              - column: { name: role, value: STORE_MANAGER }
              - column: { name: store_scope_type, value: SPECIFIC_STORES }
        # 山田次郎: スタッフ・店舗{1} 授権。
        - insert:
            tableName: platform_users
            columns:
              - column: { name: id, valueNumeric: 3 }
              - column: { name: email, value: yamada.jiro@kizuna.test }
              - column: { name: password, value: "$2a$10$vE/ReAxs2rLV.FEJSDUK4.EpsPrbllLD2uOgtPaEUh1koMTovAaue" }
              - column: { name: display_name, value: "山田次郎" }
              - column: { name: enabled, valueBoolean: true }
              - column: { name: role, value: STORE_STAFF }
              - column: { name: store_scope_type, value: SPECIFIC_STORES }

        # 授権店舗集合（SPECIFIC_STORES の実体）。
        - insert:
            tableName: platform_user_stores
            columns:
              - column: { name: platform_user_id, valueNumeric: 2 }
              - column: { name: store_id, valueNumeric: 1 }
        - insert:
            tableName: platform_user_stores
            columns:
              - column: { name: platform_user_id, valueNumeric: 2 }
              - column: { name: store_id, valueNumeric: 2 }
        - insert:
            tableName: platform_user_stores
            columns:
              - column: { name: platform_user_id, valueNumeric: 3 }
              - column: { name: store_id, valueNumeric: 1 }
  - changeSet:
      id: central-v050-002-store2-demo-users-sequence-sync
      author: kanghouchao
      changes:
        # 明示 id で挿入した autoIncrement 表の IDENTITY シーケンスを MAX(id) へ整合させる（issue #237、SeedSequenceAlignmentIT）。
        - sql:
            sql: SELECT setval(pg_get_serial_sequence('central_tenants','id'), (SELECT MAX(id) FROM central_tenants))
        - sql:
            sql: SELECT setval(pg_get_serial_sequence('platform_users','id'), (SELECT MAX(id) FROM platform_users))
