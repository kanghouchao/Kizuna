databaseChangeLog:
  - changeSet:
      id: tenant-v050-001-store2-menus-config-seed-v2
      author: kanghouchao
      # tenant_id を固定値 2 から自然キー（store2 の domain）の部分問い合わせに置き換えた冪等版（#324）。
      # central 側で store2 が IDENTITY 採番されるため、ここでは domain から実 id を解決する。
      # t2-main / store2 の設定行が既存の DB では MARK_RAN で無害スキップする。
      preConditions:
        - onFail: MARK_RAN
        - sqlCheck:
            expectedResult: 0
            sql: SELECT COUNT(*) FROM t_menus WHERE id = 't2-main'
        - sqlCheck:
            expectedResult: 0
            sql: SELECT COUNT(*) FROM t_tenant_configs WHERE tenant_id = (SELECT id FROM central_tenants WHERE domain = 'store2.kizuna.test')
      changes:
        # 店舗2（tenant_id = store2 の domain から解決）のメニュー。tenant1 の現行実効セット（v0.1.0 08-initial-data
        # + v0.3.0 shift-menu-seed 反映後）を id t1-*→t2-* で複製する（#324 統一ログインデモ）。親を先に挿入する（parent_id FK）。

        # Main
        - insert:
            tableName: t_menus
            columns:
              - column: { name: id, value: "t2-main" }
              - column: { name: tenant_id, valueComputed: "(SELECT id FROM central_tenants WHERE domain = 'store2.kizuna.test')" }
              - column: { name: label, value: "メイン" }
              - column: { name: sort_order, valueNumeric: 10 }
        - insert:
            tableName: t_menus
            columns:
              - column: { name: id, value: "t2-dashboard" }
              - column: { name: tenant_id, valueComputed: "(SELECT id FROM central_tenants WHERE domain = 'store2.kizuna.test')" }
              - column: { name: parent_id, value: "t2-main" }
              - column: { name: label, value: "ダッシュボード" }
              - column: { name: path, value: "/tenant/dashboard" }
              - column: { name: icon, value: "HomeIcon" }
              - column: { name: sort_order, valueNumeric: 1 }

        # Operations
        - insert:
            tableName: t_menus
            columns:
              - column: { name: id, value: "t2-ops" }
              - column: { name: tenant_id, valueComputed: "(SELECT id FROM central_tenants WHERE domain = 'store2.kizuna.test')" }
              - column: { name: label, value: "業務管理" }
              - column: { name: sort_order, valueNumeric: 20 }
        - insert:
