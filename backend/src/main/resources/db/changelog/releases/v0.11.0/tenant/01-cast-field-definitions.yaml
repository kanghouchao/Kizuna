databaseChangeLog:
  - changeSet:
      id: tenant-v0110-001-cast-field-definitions-table
      author: kanghouchao
      preConditions:
        - dbms:
            type: postgresql
      changes:
        - createTable:
            tableName: t_cast_field_definitions
            remarks: キャストのカスタムフィールド定義テーブル（店舗別動的属性）
            columns:
              - column:
                  name: id
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_t_cast_field_definitions
              - column:
                  name: tenant_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: key
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                  remarks: プログラム識別子（不変・テナント内一意）
              - column:
                  name: label
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                  remarks: 表示ラベル
              - column:
                  name: display_order
                  type: INTEGER
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
                  remarks: 表示順（サーバ側自動採番）
              - column:
                  name: is_public
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
                  remarks: 公開詳細ページに表示するか
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            constraintName: fk_t_cast_field_definitions_tenant
            baseTableName: t_cast_field_definitions
            baseColumnNames: tenant_id
            referencedTableName: central_tenants
            referencedColumnNames: id
            onDelete: CASCADE
        - addUniqueConstraint:
            tableName: t_cast_field_definitions
            columnNames: tenant_id,key
            constraintName: uq_t_cast_field_definitions_tenant_key
