databaseChangeLog:
  - changeSet:
      id: tenant-v090-001-menu-permission-cleanup
      author: kanghouchao
      preConditions:
        - dbms:
            type: postgresql
      changes:
        # 旧権限文字列モデルの撤去（#326）により permission 列を消費する PERM_ 形式の authority が
        # もう発行されない。null 化して MenuTreeAssembler.visible() の既存の null 判定分岐で
        # 無条件可視へ揃える（列自体は将来のロール精緻化のため温存する）。
        - sql:
            sql: UPDATE t_menus SET permission = NULL WHERE permission IS NOT NULL
