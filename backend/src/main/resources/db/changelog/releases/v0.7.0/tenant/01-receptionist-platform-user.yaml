databaseChangeLog:
  - changeSet:
      id: tenant-v070-001-receptionist-platform-user
      author: kanghouchao
      preConditions:
        - dbms:
            type: postgresql
      changes:
        # 既存の receptionist_id 値は旧 t_users(String PK) を指しており、新しい platform_users(Long PK) の
        # PK 空間と対応が取れないため安全に NULL 化する（開発段階で本番相当データは無く、e2e もこの列を参照しない）。
        - sql:
            sql: UPDATE t_orders SET receptionist_id = NULL WHERE receptionist_id IS NOT NULL
        # 旧 FK(t_users 参照)を除去する。
        - dropForeignKeyConstraint:
            baseTableName: t_orders
            constraintName: fk_t_orders_receptionist
        # VARCHAR(64) → BIGINT は PostgreSQL が自動キャストできず modifyDataType（USING 無しの
        # ALTER COLUMN TYPE）が失敗するため、NULL 化済みの列を drop → 再作成する（データは既に空のため実質等価）。
        - dropColumn:
            tableName: t_orders
            columnName: receptionist_id
        - addColumn:
            tableName: t_orders
            columns:
              - column:
                  name: receptionist_id
                  type: BIGINT
                  remarks: 受付担当者ID (platform_usersに関連)
        # 新 FK: platform_users(Long PK) を参照。ON DELETE SET NULL は旧 FK と同じ挙動。
        - addForeignKeyConstraint:
            constraintName: fk_t_orders_receptionist_platform_user
            baseTableName: t_orders
            baseColumnNames: receptionist_id
            referencedTableName: platform_users
            referencedColumnNames: id
            onDelete: SET NULL
