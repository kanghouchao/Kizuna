databaseChangeLog:
    - changeSet:
          id: 010-create-system-config
          author: kanghouchao
          changes:
              - createTable:
                    tableName: central_configs
                    remarks: システム全体の設定（SMTP, メンテナンスモード等）
                    columns:
                        - column:
                              name: id
                              type: BIGINT
                              autoIncrement: true
                              constraints:
                                  nullable: false
                                  primaryKey: true
                                  primaryKeyName: pk_central_configs
                        - column:
                              name: config_key
                              type: VARCHAR(100)
                              constraints:
                                  nullable: false
                                  unique: true
                                  uniqueConstraintName: uq_central_configs_key
                        - column:
                              name: config_value
                              type: TEXT
                        - column:
                              name: category
                              type: VARCHAR(50)
                              remarks: 設定のカテゴリ（SMTP, SYSTEM, SECURITY等）
                        - column:
                              name: description
                              type: VARCHAR(500)
                        - column:
                              name: created_at
                              type: TIMESTAMP WITH TIME ZONE
                              defaultValueComputed: CURRENT_TIMESTAMP
                              constraints:
                                  nullable: false
                        - column:
                              name: updated_at
                              type: TIMESTAMP WITH TIME ZONE
                              defaultValueComputed: CURRENT_TIMESTAMP
                              constraints:
                                  nullable: false

    - changeSet:
          id: 010-seed-system-config
          author: kanghouchao
          comment: デフォルトのシステム設定を投入
          changes:
              - insert:
                    tableName: central_configs
                    columns:
                        - column:
                              { name: config_key, value: "maintenance_mode" }
                        - column: { name: config_value, value: "false" }
                        - column: { name: category, value: "SYSTEM" }
                        - column:
                              {
                                  name: description,
                                  value: "システムメンテナンスモード",
                              }
              - insert:
                    tableName: central_configs
                    columns:
                        - column: { name: config_key, value: "smtp_host" }
                        - column: { name: config_value, value: "localhost" }
                        - column: { name: category, value: "SMTP" }
                        - column:
                              { name: description, value: "SMTPサーバーホスト" }
              - insert:
                    tableName: central_configs
                    columns:
                        - column: { name: config_key, value: "smtp_port" }
                        - column: { name: config_value, value: "25" }
                        - column: { name: category, value: "SMTP" }
                        - column:
                              { name: description, value: "SMTPサーバーポート" }

    - changeSet:
          id: 010-add-system-config-permissions
          author: kanghouchao
          comment: システム設定用の権限とメニューを追加
          changes:
              - insert:
                    tableName: central_permissions
                    columns:
                        - column: { name: id, valueNumeric: 2 }
                        - column: { name: name, value: "SYSTEM_CONFIG" }

              # Role Permission Mapping (ADMIN role id=1)
              - insert:
                    tableName: central_role_permissions
                    columns:
                        - column: { name: role_id, valueNumeric: 1 }
                        - column: { name: permission_id, valueNumeric: 2 }

              # 1. Settings Group (ID 4)
              - insert:
                    tableName: central_menus
                    columns:
                        - column: { name: id, valueNumeric: 4 }
                        - column: { name: label, value: "設定" }
                        - column: { name: sort_order, valueNumeric: 90 }

              # 2. System Settings Item (ID 5)
              - insert:
                    tableName: central_menus
                    columns:
                        - column: { name: id, valueNumeric: 5 }
                        - column: { name: parent_id, valueNumeric: 4 }
                        - column: { name: label, value: "システム設定" }
                        - column: { name: path, value: "/central/settings" }
                        - column: { name: icon, value: "Cog6ToothIcon" }
                        - column: { name: permission, value: "SYSTEM_CONFIG" }
                        - column: { name: sort_order, valueNumeric: 1 }
