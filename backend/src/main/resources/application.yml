spring:
  profiles:
    active:
    - ${SPRING_PROFILE:dev}
  application:
    name: ${APP_NAME:Kizuna}
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:kizuna}?sslmode=${POSTGRES_SSLMODE:disable}
    username: ${POSTGRES_USER:user}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: ${HIKARI_MINIMUM_IDLE:2}
      maximum-pool-size: ${HIKARI_MAXIMUM_POOL_SIZE:10}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:600000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:1800000}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:30000}
      leak-detection-threshold: ${HIKARI_LEAK_DETECTION_THRESHOLD:2000}
      validation-timeout: ${HIKARI_VALIDATION_TIMEOUT:5000}
      initialization-fail-timeout: ${HIKARI_INITIALIZATION_FAIL_TIMEOUT:-1}
      connection-test-query: SELECT 1
      data-source-properties:
        ssl: ${POSTGRES_SSL:false}
  jpa:
    show-sql: ${SPRING_JPA_SHOW_SQL:true}
    open-in-view: ${SPRING_JPA_OPEN_IN_VIEW:false}
  liquibase:
    # デモデータ（店舗 2 件と店長・スタッフ）の changeSet は contextFilter: demo で隔離してある。
    # 既定は production＝デモデータを投入しない（設定漏れが安全側に倒れるように）。
    # 開発・統合テスト・E2E はこのデータに依存するため compose 側で demo を明示する。
    # コンテキスト無指定の changeSet（スキーマ本体と必須シード）は、どの値でも常に適用される。
    contexts: ${LIQUIBASE_CONTEXTS:production}
    parameters:
      # 初期 HQ 管理者のパスワードハッシュ（seed/04-platform-admin.yaml が参照）。
      # 既定値は開発・E2E 用の平文 pass の bcrypt ハッシュ。本番は必ず自前の値を設定すること。
      initialAdminPasswordHash: ${INITIAL_ADMIN_PASSWORD_HASH:$2a$10$vE/ReAxs2rLV.FEJSDUK4.EpsPrbllLD2uOgtPaEUh1koMTovAaue}
      # デモユーザー（田中花子・山田次郎）のパスワードハッシュ（seed/05-demo.yaml が参照）。
      # demo コンテキストでしか使われないため本番で設定する必要はない。
      demoUserPasswordHash: ${DEMO_USER_PASSWORD_HASH:$2a$10$vE/ReAxs2rLV.FEJSDUK4.EpsPrbllLD2uOgtPaEUh1koMTovAaue}
  # Jackson 3（Spring Boot 4 の既定）の JsonMapper をカスタマイズする。旧 JacksonConfig の
  # Jackson2ObjectMapperBuilderCustomizer をプロパティへ移設したもの。java.time は Jackson 3 が自動登録するため
  # JavaTimeModule の明示登録は不要。
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null
    # Jackson 3 では日付関連のフラグは SerializationFeature から DateTimeFeature へ移動したため datatype.datetime 配下で指定する。
    datatype:
      datetime:
        write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
  cache:
    type: redis
    redis:
      time-to-live: ${SPRING_CACHE_TTL_MS:600000}
      cache-null-values: ${SPRING_CACHE_NULL_VALUES:false}
      use-key-prefix: ${SPRING_CACHE_USE_KEY_PREFIX:true}
      key-prefix: ${SPRING_CACHE_KEY_PREFIX:kizuna:cache:}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      ssl:
        enabled: ${REDIS_SSL:false}
      timeout: ${REDIS_TIMEOUT:2000}ms
      client-type: ${REDIS_CLIENT_TYPE:lettuce}
      lettuce:
        pool:
          max-active: ${LETTUCE_POOL_MAX_ACTIVE:8}
          max-idle: ${LETTUCE_POOL_MAX_IDLE:8}
          min-idle: ${LETTUCE_POOL_MIN_IDLE:0}
          max-wait: ${LETTUCE_POOL_MAX_WAIT:2000}ms
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  task:
    execution:
      pool:
        core-size: 4
        max-size: 10
        keep-alive: 60s
        queue-capacity: 20
      thread-name-prefix: task-kizuna-

management:
  endpoint:
    health:
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include:
            - readinessState
            - db
            - redis
  health:
    db:
      enabled: true
    redis:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health
app:
  domain: ${APP_DOMAIN:localhost}
  scheme: ${APP_SCHEME:http}
  timezone: ${APP_TIMEZONE:Asia/Tokyo}
  jwt:
    expiration: ${APP_JWT_EXPIRATION_MS:3600000}
    secret: ${APP_JWT_SECRET}
  upload:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    bucket: ${MINIO_BUCKET:uploads}
    access-key: ${MINIO_ROOT_USER:minioadmin}
    secret-key: ${MINIO_ROOT_PASSWORD:changeme}
    url-prefix: ${APP_UPLOAD_URL_PREFIX:/static/uploads/}
    max-file-size: ${APP_UPLOAD_MAX_FILE_SIZE:10485760}
    allowed-types:
      - image/jpeg
      - image/png
      - image/gif
      - image/webp
