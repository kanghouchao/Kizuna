version: "3"

# バックエンド用タスク
vars:
  DOCKER_IMAGE: '{{default "kizuna-backend" .DOCKER_IMAGE}}'
  DOCKER_TAG: '{{default "latest" .DOCKER_TAG}}'
  REPORT_DIR: '{{default "../reports" .REPORT_DIR}}'

tasks:
  default:
    desc: ヘルプ情報を表示
    cmds:
      - task: help

  help:
    desc: ヘルプ情報を表示
    cmds:
      - task --list

  lint:
    desc: コードスタイルを検査（Docker lint ステージ経由）
    cmds:
      - echo "🧹 Docker の lint ステージでコードスタイル検査を実行中..."
      - |
        docker buildx build \
          --target lint \
          --output type=cacheonly \
          .

  format:
    desc: コードスタイルを自動修正（Spotless apply; ローカルで gradlew 実行）
    cmds:
      - echo "✍️  Spotless で自動整形を実行中..."
      - ./gradlew --no-daemon --warning-mode=all spotlessApply

  test:
    desc: バックエンドの全テストを実行し、reports/backend に収集
    cmds:
      - echo "🧪  バックエンドの単体テストを実行中..."
      - |
        docker buildx build \
          --target test \
          -t {{.DOCKER_IMAGE}}-test:{{.DOCKER_TAG}} \
          --load \
          .
      - echo "🧪  バックエンドの統合テストを実行中（compose ネットワーク接続）..."
      # -v を付けない: 唯一のボリュームは gradle キャッシュで、消すと毎回フル再取得になり
      # 依存解決の flaky 要因になる。DB は tmpfs のためコンテナ削除だけで使い捨てが成立する
      - defer: docker compose -f docker-compose.test.yml down
      - docker compose -f docker-compose.test.yml run --rm integration-test

  test-copy-artifacts:
    desc: テスト成果物を REPORT_DIR/backend にコピー
    cmds:
      - rm -rf "{{.REPORT_DIR}}/backend"
      - |
        set -e
        cid=$(docker create {{.DOCKER_IMAGE}}-test:{{.DOCKER_TAG}} true)
        docker cp "$cid:/app/build/reports" "{{.REPORT_DIR}}/backend" || true
        docker rm -f "$cid" >/dev/null 2>&1 || true

  build:
    desc: バックエンドDockerイメージをビルド
    cmds:
      - echo "🏗️  バックエンドDockerイメージをビルド中..."
      - docker buildx build -t {{.DOCKER_IMAGE}}:{{.DOCKER_TAG}} .

  clean:
    desc: Dockerイメージを削除
    cmds:
      - echo "🗑️  バックエンドDockerイメージを削除中..."
      - docker rmi {{.DOCKER_IMAGE}}:{{.DOCKER_TAG}} 2>/dev/null || echo "イメージが存在しないか、既に削除されています"
      - docker rmi {{.DOCKER_IMAGE}}-test:{{.DOCKER_TAG}} 2>/dev/null || echo "テストイメージが存在しないか、既に削除されています"
      - docker rmi {{.DOCKER_IMAGE}}-lint:{{.DOCKER_TAG}} 2>/dev/null || echo "Lintイメージが存在しないか、既に削除されています"
