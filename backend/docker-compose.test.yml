# 統合テスト専用 compose（issue #225）
# 開発用スタック（プロジェクト名 kizuna）とは独立したプロジェクト名で、
# データは tmpfs のみ（ボリューム永続化なし）。実行ごとに down で使い捨てる
# （gradle キャッシュボリュームだけは依存再取得の flaky 回避のため保持する）。
name: kizuna-backend-test

services:
  database:
    image: postgres:18-alpine
    tmpfs:
      - /var/lib/postgresql
    environment:
      POSTGRES_DB: kizuna
      POSTGRES_USER: kizuna
      POSTGRES_PASSWORD: password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kizuna -d kizuna"]
      interval: 5s
      timeout: 5s
      retries: 10

  cache:
    image: redis:8.8.0-alpine3.23
    # 資格情報は開発用 compose と同じ変数参照形式（既定値はテスト専用のダミー値）
    command: redis-server --requirepass ${REDIS_PASSWORD:-password}
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD:-password}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 10

  storage:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    tmpfs:
      - /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniosecret}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  integration-test:
    image: gradle:9.6.1-jdk25-ubi10
    user: root # bind mount への build/ 書き込みのため（rules/backend.md の Spotless Docker 実行と同じ流儀）
    working_dir: /app
    volumes:
      - .:/app
      - gradle-it-cache:/root/.gradle
    environment:
      DB_HOST: database
      DB_PORT: "5432"
      DB_NAME: kizuna
      DB_USERNAME: kizuna
      DB_PASSWORD: password
      REDIS_HOST: cache
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-password}
      # HMAC-SHA256 の要件（RFC 7518）で 256bit 以上必要（JwtUtil は raw bytes 解釈）
      APP_JWT_SECRET: integration-test-secret-0123456789abcdef
      # S3（MinIO）接続。access/secret は storage の root アカウントと同じ値を参照して一致させる
      UPLOAD_S3_ENDPOINT: http://storage:9000
      UPLOAD_S3_BUCKET: uploads
      UPLOAD_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      UPLOAD_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-miniosecret}
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
      storage:
        condition: service_healthy
    command: ./gradlew integrationTest --no-daemon

volumes:
  gradle-it-cache:
