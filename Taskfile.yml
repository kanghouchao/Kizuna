version: "3"

# ルートの運用タスクを Taskfile に集約
vars:
  env: '{{default "development" .env}}'
  service: '{{default "" .service}}'

tasks:
  default:
    desc: ヘルプ情報を表示
    cmds:
      - task: help

  help:
    desc: ヘルプ情報を表示
    cmds:
      - echo "プロジェクト管理コマンド:"
      - echo ""
      - task --list

  build:
    desc: Dockerイメージをビルド
    cmds:
      - |
        if [ -n "{{.service}}" ]; then
          task -d "{{.service}}" build
        else
          task -d backend build
          task -d frontend build
        fi

  lint:
    desc: すべてのサービスのLintを実行（service=frontend|backend で個別指定可）
    cmds:
      - |
        if [ -n "{{.service}}" ]; then
          echo "🧹 {{.service}} の Lint を実行中..."
          task -d "{{.service}}" lint
        else
          echo "🧹 すべてのサービスの Lint を実行中..."
          echo "🧹 Frontend lint..."
          task -d frontend lint
          echo "🧹 Backend lint..."
          task -d backend lint
          echo "✅ Lint 完了"
        fi

  test:
    desc: すべてのサービスのテストを実行（frontend/coverage & backend/reports に収集）
    cmds:
      - |
        if [ -n "{{.service}}" ]; then
          echo "🔍 {{.service}}サービスのテストを実行中..."
          task -d "{{.service}}" test
        else
          echo "🔍 すべてのサービスのテストを実行中..."
          echo "🧪 Frontend tests..."
          task -d frontend test
          echo "🧪 Backend tests..."
          task -d backend test
          echo "✅テスト完了"
        fi

  test-unit:
    desc: PR ゲート用の単体テストを実行（frontend jest + backend unit + coverage gate）
    cmds:
      - echo "🧪 Frontend unit tests..."
      - task -d frontend test
      - echo "🧪 Backend unit tests..."
      - task -d backend test-unit

  test-integration:
    desc: post-merge 検証用の統合テストを実行（backend integration）
    cmds:
      - echo "🧪 Backend integration tests..."
      - task -d backend test-integration

  e2e:
    desc: E2E（playwright-bdd）をフル実スタックで実行（build → up → 実行 → down）
    cmds:
      - echo "🏗️  E2E 用にイメージをビルド..."
      - task: build
      # 成否・途中クラッシュを問わずスタックを必ず停止する（up 失敗時の残骸も回収）。
      - defer: { task: down }
      - echo "🚀 開発スタックを起動..."
      - task: up
      - |
        set -e
        echo "⏳ gateway 経由で frontend の応答を待機..."
        ready=0
        for i in $(seq 1 60); do
          if curl -sf -H "Host: store1.kizuna.test" http://localhost/ >/dev/null 2>&1; then
            ready=1
            echo "✅ frontend 応答確認（${i} 回目）"
            break
          fi
          sleep 2
        done
        if [ "$ready" -ne 1 ]; then
          echo "❌ frontend が規定時間内に応答しませんでした"
          exit 1
        fi
        echo "🎭 E2E（playwright-bdd）を one-shot コンテナで実行..."
        docker compose -f e2e/docker-compose.e2e.yml run --rm e2e

  reports:
    desc: テストレポートを収集
    cmds:
      - |
        if [ -n "{{.service}}" ]; then
          echo "📂 {{.service}}サービスのレポートを収集中..."
          task -d "{{.service}}" test-copy-artifacts
        else
          echo "📂 すべてのサービスのレポートを収集中..."
          echo "📂 Frontend reports..."
          task -d frontend test-copy-artifacts
          echo "📂 Backend reports..."
          task -d backend test-copy-artifacts
          echo "✅ レポート収集完了"
        fi

  format:
    desc: すべてのサービスのフォーマットを実行（service=frontend|backend で個別指定可）
    cmds:
      - |
        if [ -n "{{.service}}" ]; then
          echo "✍️  {{.service}} のフォーマットを実行中..."
          task -d "{{.service}}" format
        else
          echo "✍️  すべてのサービスのフォーマットを実行中..."
          echo "✍️  Frontend format..."
          task -d frontend format
          echo "✍️  Backend format..."
          task -d backend format
          echo "✅ Format 完了"
        fi

  up:
    desc: サービスを起動
    cmds:
      - echo "🚀 サービスを起動中..."
      - task -d "infrastructure/{{.env}}" up

  down:
    desc: サービスを停止
    cmds:
      - echo "🛑 サービスを停止中..."
      - task -d "infrastructure/{{.env}}" down

  ps:
    desc: サービスの状態を表示
    cmds:
      - task -d "infrastructure/{{.env}}" ps

  logs:
    desc: すべてのサービスのログを表示
    cmds:
      - |
        if [ -n "{{.service}}" ]; then
          echo "📜 {{.service}}サービスのログを表示中..."
          task -d "infrastructure/{{.env}}" logs service="{{.service}}"
        else
          task -d "infrastructure/{{.env}}" logs
        fi

  exec:
    desc: サービスコンテナに入る
    cmds:
      - |
        if [ -n "{{.service}}" ]; then
          task -d "infrastructure/{{.env}}" exec service="{{.service}}"
        else
          echo "❗ service を指定してください。例: task exec service=backend"
          exit 1
        fi

  clean:
    desc: 未使用のイメージとコンテナをクリーンアップ
    cmds:
      - |
        if [ -n "{{.service}}" ]; then
          task -d "{{.service}}" clean
        else
          task -d backend clean
          task -d frontend clean
          docker system prune -f
        fi

  restart:
    desc: サービスを再起動
    cmds:
      - |
        if [ -n "{{.service}}" ]; then
          echo "🔄 {{.service}}サービスを再起動中..."
          task -d "infrastructure/{{.env}}" restart service="{{.service}}"
        else
          echo "🔄 すべてのサービスを再起動中..."
          task -d "infrastructure/{{.env}}" restart
        fi
