version: "3"

# 開発環境用タスク
vars:
  PROJECT_NAME: '{{default "kizuna" .PROJECT_NAME}}'
  service: '{{default "" .service}}'

tasks:
  ensure-env:
    desc: worktree に .env が無ければ主検出からコピーする（開発環境のみの補完。release には適用しない）
    internal: true
    status:
      - test -f .env
    cmds:
      - |
        MAIN_ROOT="$(dirname "$(git rev-parse --path-format=absolute --git-common-dir)")"
        if [ "$MAIN_ROOT" != "$(git rev-parse --show-toplevel)" ] && [ -f "$MAIN_ROOT/infrastructure/development/.env" ]; then
          cp "$MAIN_ROOT/infrastructure/development/.env" .env
          echo "🔑 .env が無いため主検出（$MAIN_ROOT）からコピーした"
        else
          echo "❗ .env がありません。infrastructure/.env.example を参照して配置してください" >&2
          exit 1
        fi

  up:
    desc: サービスを起動
    deps: [ensure-env]
    cmds:
      - docker compose -p {{.PROJECT_NAME}} up -d --timestamps --wait

  down:
    desc: サービスを停止
    cmds:
      - docker compose -p {{.PROJECT_NAME}} down

  ps:
    desc: サービス状態を表示
    cmds:
      - docker compose -p {{.PROJECT_NAME}} ps

  logs:
    desc: ログを表示
    cmds:
      - |
        if [ -n "{{.service}}" ]; then
          echo "📜 {{.service}}サービスのログを表示中..."
          docker compose -p {{.PROJECT_NAME}} logs -f {{.service}}
        else
          docker compose -p {{.PROJECT_NAME}} logs -f
        fi

  exec:
    desc: サービスコンテナに入る
    cmds:
      - |
        if [ -n "{{.service}}" ]; then
          docker compose -p {{.PROJECT_NAME}} exec {{.service}} sh
        else
          echo "❗ serviceを指定してください。例: task exec service=backend"
          exit 1
        fi

  restart:
    desc: サービスを再起動
    cmds:
      - |
        if [ -n "{{.service}}" ]; then
          echo "🔄 {{.service}}サービスを再起動中..."
          docker compose -p {{.PROJECT_NAME}} restart {{.service}}
        else
          echo "🔄 すべてのサービスを再起動中..."
          docker compose -p {{.PROJECT_NAME}} restart
        fi
