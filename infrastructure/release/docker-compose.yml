# docker-compose.yml
name: kizuna

services:
  # Database: PostgreSQL
  database:
    image: postgres:18-alpine
    container_name: database
    environment:
      POSTGRES_DB: ${DB_NAME:-kizuna}
      POSTGRES_USER: ${DB_USERNAME:-kizuna}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - db-data:/var/lib/postgresql
    networks:
      - network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-kizuna} -d ${DB_NAME:-kizuna}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cache: Redis
  cache:
    image: redis:8.8.0-alpine3.23
    container_name: redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-password}
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD:-password}
    volumes:
      - redis-data:/data
    networks:
      - network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend: Java Spring Boot
  backend:
    image: kizuna-backend:latest
    container_name: backend
    networks:
      - network
    env_file:
      - .env
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
      storage:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.backend.tls.domains[0].main=${APP_DOMAIN:-kizuna.jp}"
      - "traefik.http.routers.backend.middlewares=backend-strip@docker"
      - "traefik.http.services.backend.loadbalancer.server.port=8080"
      - "traefik.http.middlewares.backend-strip.stripPrefix.prefixes=/api"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      start_period: 15s
      interval: 5s
      timeout: 3s
      retries: 3
    restart: on-failure:3

  # Object Storage: MinIO (S3 互換オブジェクトストレージ)
  storage:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: storage
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme}
    volumes:
      - storage-data:/data
    networks:
      - network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.storage.rule=PathPrefix(`/static`)"
      - "traefik.http.routers.storage.entrypoints=websecure"
      - "traefik.http.routers.storage.tls.certresolver=letsencrypt"
      - "traefik.http.routers.storage.tls.domains[0].main=${APP_DOMAIN:-kizuna.jp}"
      - "traefik.http.routers.storage.middlewares=storage-strip@docker"
      - "traefik.http.services.storage.loadbalancer.server.port=9000"
      - "traefik.http.middlewares.storage-strip.stripPrefix.prefixes=/static"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure:3

  # Frontend: next.js
  frontend:
    image: kizuna-frontend:latest
    container_name: frontend
    networks:
      - network
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`) && !PathPrefix(`/api`) && !PathPrefix(`/static`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.frontend.tls.domains[0].main=${APP_DOMAIN:-kizuna.jp}"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/health || exit 1"]
      start_period: 20s
      interval: 5s
      timeout: 5s
      retries: 5
    restart: on-failure:3

  # Traefik: The reverse proxy
  gateway:
    image: traefik:v3.7.6
    container_name: traefik
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./traefik/:/etc/traefik/:ro"
      - "acme-data:/letsencrypt"
    networks:
      - network
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

networks:
  network:
    driver: bridge

volumes:
  db-data:
    driver: local
  redis-data:
    driver: local
  storage-data:
    driver: local
  acme-data:
    driver: local
