# docker-compose.yml
name: kizuna

# 環境変数の受け渡し方針:
# - backend / frontend は env_file を使わず、消費する変数を environment で明示列挙する
#   （何を読むかがファイル上で確定し、shell 環境からの上書きも効く）。
# - 「コンテナ構成上 application.yml の既定値では必ず誤りになる項目」（ホスト名・ポート・
#   資格情報・エンドポイント・Liquibase コンテキスト）だけ ${VAR:-既定} を書く。
# - それ以外のチューニング項目は裸名で列挙する。.env にあれば渡り、無ければコンテナ内で
#   未定義のままになり application.yml の既定値が生きる（既定値の二重管理を避ける）。
# - 本番の資格情報は ${VAR:?メッセージ} で必須化する（fail-loud）。既定値へ黙って落ちると
#   「開発用パスワードのまま本番が起動する」「旧 DB_* のままの .env で認証だけが失敗する」
#   といった事故になるため、未設定なら compose の時点で理由付きで停止させる。
#   development 側は #311 の「陳腐化した .env でも起動できる」要件を優先し既定値のままにする。

services:
  # Database: PostgreSQL
  database:
    image: postgres:18-alpine
    container_name: database
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kizuna}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER を .env に設定してください（旧 DB_USERNAME から改名。既存ボリュームがある場合は初回起動時と同じ値にすること）}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD を .env に設定してください（旧 DB_PASSWORD から改名。既存ボリュームがある場合は初回起動時と同じ値にすること）}
    volumes:
      - db-data:/var/lib/postgresql
    networks:
      - network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-kizuna}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cache: Redis
  cache:
    image: redis:8.8.0-alpine3.23
    container_name: redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD を .env に設定してください}
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD:?REDIS_PASSWORD を .env に設定してください}
    volumes:
      - redis-data:/data
    networks:
      - network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend: Java Spring Boot
  backend:
    image: kizuna-backend:latest
    container_name: backend
    networks:
      - network
    environment:
      # --- コンテナ構成で決まる項目（既定値必須） ---
      - POSTGRES_HOST=${POSTGRES_HOST:-database}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-kizuna}
      - POSTGRES_USER=${POSTGRES_USER:?POSTGRES_USER を .env に設定してください（旧 DB_USERNAME から改名）}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD を .env に設定してください（旧 DB_PASSWORD から改名）}
      - REDIS_HOST=${REDIS_HOST:-cache}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD を .env に設定してください}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-http://storage:9000}
      - MINIO_BUCKET=${MINIO_BUCKET:-uploads}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:?MINIO_ROOT_USER を .env に設定してください（旧 UPLOAD_S3_ACCESS_KEY から改名）}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD を .env に設定してください（旧 UPLOAD_S3_SECRET_KEY から改名）}
      # 本番はデモデータを投入しない
      - LIQUIBASE_CONTEXTS=${LIQUIBASE_CONTEXTS:-production}
      # 公開サイトは HTTPS
      - APP_SCHEME=${APP_SCHEME:-https}
      # JWT 署名鍵と初期管理者ハッシュは既定値へ落とすと事故になるため必須化する。
      # 前者は application.yml に既定が無く起動時に失敗するが、compose の時点で理由付きで止める。
      # 後者を落とすと開発用の既定ハッシュ（平文 pass）のまま本番の HQ 管理者が播種される。
      - APP_JWT_SECRET=${APP_JWT_SECRET:?APP_JWT_SECRET を .env に設定してください（HMAC-SHA256 のため 256bit 以上）}
      - INITIAL_ADMIN_PASSWORD_HASH=${INITIAL_ADMIN_PASSWORD_HASH:?INITIAL_ADMIN_PASSWORD_HASH を .env に設定してください（未設定だと開発用の既定パスワードで管理者が作成されます）}
      # --- 以下は裸名。.env にあれば渡り、無ければ application.yml の既定値が効く ---
      - SPRING_PROFILE
      - SERVER_PORT
      - APP_NAME
      - APP_DOMAIN
      - APP_TIMEZONE
      - APP_JWT_EXPIRATION_MS
      - APP_UPLOAD_URL_PREFIX
      - APP_UPLOAD_MAX_FILE_SIZE
      - DEMO_USER_PASSWORD_HASH
      - POSTGRES_SSLMODE
      - POSTGRES_SSL
      - HIKARI_MINIMUM_IDLE
      - HIKARI_MAXIMUM_POOL_SIZE
      - HIKARI_IDLE_TIMEOUT
      - HIKARI_MAX_LIFETIME
      - HIKARI_CONNECTION_TIMEOUT
      - HIKARI_LEAK_DETECTION_THRESHOLD
      - HIKARI_VALIDATION_TIMEOUT
      - HIKARI_INITIALIZATION_FAIL_TIMEOUT
      - REDIS_DATABASE
      - REDIS_SSL
      - REDIS_TIMEOUT
      - REDIS_CLIENT_TYPE
      - LETTUCE_POOL_MAX_ACTIVE
      - LETTUCE_POOL_MAX_IDLE
      - LETTUCE_POOL_MIN_IDLE
      - LETTUCE_POOL_MAX_WAIT
      - SPRING_CACHE_TTL_MS
      - SPRING_CACHE_NULL_VALUES
      - SPRING_CACHE_USE_KEY_PREFIX
      - SPRING_CACHE_KEY_PREFIX
      - SPRING_JPA_SHOW_SQL
      - SPRING_JPA_OPEN_IN_VIEW
      - SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL
      # Spring Mail は DB のシステム設定（t_system_configs の smtp_*）が未設定のときのフォールバック先
      - SPRING_MAIL_HOST
      - SPRING_MAIL_PORT
      - SPRING_MAIL_USERNAME
      - SPRING_MAIL_PASSWORD
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
      storage:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.backend.tls.domains[0].main=${APP_DOMAIN:-kizuna.jp}"
      - "traefik.http.routers.backend.middlewares=backend-strip@docker"
      - "traefik.http.services.backend.loadbalancer.server.port=8080"
      - "traefik.http.middlewares.backend-strip.stripPrefix.prefixes=/api"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      start_period: 15s
      interval: 5s
      timeout: 3s
      retries: 3
    restart: on-failure:3

  # Object Storage: MinIO (S3 互換オブジェクトストレージ)
  storage:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: storage
    command: server /data --console-address ":9001"
    environment:
      # backend もこの同じ変数を S3 の access/secret key として参照する（設定元を一本化する）
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER を .env に設定してください}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD を .env に設定してください}
      # 管理コンソール（9001）は release では Traefik に載せない。root 資格情報だけが
      # 防壁の管理画面を公開ホスト名へ晒すことになるため（development のみ /minio で提供する）。
      # 遠隔管理が必要になったら、アクセス制御を設計した上で改めて公開すること。
    volumes:
      - storage-data:/data
    networks:
      - network
    labels:
      - "traefik.enable=true"
      # /static: オブジェクト配信（S3 API ポート）。複数サービスを定義するため router に service を明示する。
      - "traefik.http.routers.storage.rule=PathPrefix(`/static`)"
      - "traefik.http.routers.storage.entrypoints=websecure"
      - "traefik.http.routers.storage.tls.certresolver=letsencrypt"
      - "traefik.http.routers.storage.tls.domains[0].main=${APP_DOMAIN:-kizuna.jp}"
      - "traefik.http.routers.storage.middlewares=storage-strip@docker"
      - "traefik.http.routers.storage.service=storage"
      - "traefik.http.services.storage.loadbalancer.server.port=9000"
      - "traefik.http.middlewares.storage-strip.stripPrefix.prefixes=/static"
      # 管理コンソール（9001）の router は意図的に置かない（上記コメント参照）。
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure:3

  # Frontend: next.js
  frontend:
    image: kizuna-frontend:latest
    container_name: frontend
    networks:
      - network
    environment:
      # --- コンテナ構成で決まる項目（既定値必須） ---
      - STORE_LOOKUP_API_URL=${STORE_LOOKUP_API_URL:-http://backend:8080/platform/stores/lookup}
      - STORE_CONFIG_API_URL=${STORE_CONFIG_API_URL:-http://backend:8080/store/config/public}
      # --- 以下は裸名 ---
      - NODE_ENV
      - APP_DOMAIN
      - NEXT_PUBLIC_PLATFORM_DOMAIN
    depends_on:
      backend:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`) && !PathPrefix(`/api`) && !PathPrefix(`/static`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.frontend.tls.domains[0].main=${APP_DOMAIN:-kizuna.jp}"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/health || exit 1"]
      start_period: 20s
      interval: 5s
      timeout: 5s
      retries: 5
    restart: on-failure:3

  # Traefik: The reverse proxy
  gateway:
    image: traefik:v3.7.6
    container_name: traefik
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./traefik/:/etc/traefik/:ro"
      - "acme-data:/letsencrypt"
    networks:
      - network
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

networks:
  network:
    driver: bridge

volumes:
  db-data:
    driver: local
  redis-data:
    driver: local
  storage-data:
    driver: local
  acme-data:
    driver: local
